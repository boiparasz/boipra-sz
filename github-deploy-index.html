            <p className="text-xs mt-2 text-blue-500">Share the join link: <strong>your-github-url/join.html</strong></p>
          </div>
        ) : (
          <div className="space-y-3">
            {applications.map((app) => (
              <div key={app.APP_ID} className="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div className="p-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <div className="w-11 h-11 rounded-full bg-blue-100 flex items-center justify-center text-blue-800 font-bold text-sm">{String(app.NAME||"?").charAt(0)}</div>
                      <div>
                        <div className="font-semibold text-gray-900">{app.TITLE} {app.NAME}</div>
                        <div className="text-xs text-gray-500">PF: {app.PF_NO} · {app.CONTACT_1} · {app.ZONE}</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs bg-blue-100 text-blue-800 font-medium px-2 py-0.5 rounded-full">{app.APP_ID}</span>
                      <span className="text-xs text-gray-400">{app.SUBMITTED_AT ? app.SUBMITTED_AT.slice(0,10) : ""}</span>
                    </div>
                  </div>

                  <div className="flex gap-2 mt-3">
                    <button onClick={() => setExpandedApp(expandedApp === app.APP_ID ? null : app.APP_ID)} className="flex items-center gap-1 text-xs text-blue-700 hover:underline font-medium">
                      <Eye size={12}/>{expandedApp === app.APP_ID ? "Hide Details" : "View Details"}
                    </button>
                    {app.CONTACT_1 && <a href={`https://wa.me/91${String(app.CONTACT_1).replace(/\D/g,'').slice(-10)}`} target="_blank" rel="noopener" className="flex items-center gap-1 text-xs text-green-600 hover:underline font-medium">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 0 0 .611.611l4.458-1.495A11.952 11.952 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.387 0-4.592-.836-6.318-2.228l-.143-.113-3.013 1.01 1.01-3.013-.113-.143A9.952 9.952 0 0 1 2 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
                      WhatsApp
                    </a>}
                  </div>
                </div>

                {/* Expanded Detail */}
                {expandedApp === app.APP_ID && (
                  <div className="bg-gray-50 border-t px-4 py-4">
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-x-6 gap-y-2 mb-4">
                      {appDetailFields.map(([label, fn]) => {
                        const val = fn(app);
                        if (!val || !String(val).trim()) return null;
                        return <div key={label}><span className="text-xs text-gray-400 uppercase">{label}</span><p className="text-sm font-medium text-gray-900">{val}</p></div>;
                      })}
                    </div>
                    <div className="flex gap-3 pt-3 border-t">
                      <button onClick={() => handleApprove(app)} disabled={processing === app.APP_ID}
                        className="flex items-center gap-2 bg-green-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-green-700 transition disabled:opacity-60">
                        {processing === app.APP_ID ? <RefreshCw size={14} className="animate-spin"/> : <CheckCircle size={14}/>}
                        Approve & Add as Member
                      </button>
                      <button onClick={() => handleReject(app)} disabled={processing === app.APP_ID}
                        className="flex items-center gap-2 bg-white border border-red-300 text-red-700 px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-red-50 transition disabled:opacity-60">
                        <XCircle size={14}/>Reject
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )
      )}

      {/* Manual Queue Tab */}
      {tab === "manual" && (
        onboarding.length === 0 ? (
          <div className="bg-white rounded-xl shadow-sm border p-12 text-center text-gray-400"><ClipboardList size={40} className="mx-auto mb-3 text-gray-300"/>No manual applications. Use "Log Manual" to add one, or share the online join form.</div>
        ) : (
          <div className="space-y-3">
            {onboarding.map((o, idx) => {
              const done = ticks.filter(t => o[t] === "Y").length;
              const isImported = o.source === "monthly-import";
              return (
                <div key={idx} className={`bg-white rounded-xl shadow-sm border p-4 ${isImported ? "border-l-4 border-l-purple-400" : ""}`}>
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-3">
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm ${isImported ? "bg-purple-100 text-purple-800" : "bg-amber-100 text-amber-800"}`}>{o.name?.charAt(0) || "?"}</div>
                      <div>
                        <div className="font-semibold text-gray-900">{o.name || "(No name)"} <span className="text-gray-400 font-normal text-xs">#{o.appNo}</span>
                          {isImported && <span className="ml-2 text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">From Monthly Import</span>}
                          {isImported && o.importedMSNO && <span className="ml-1 text-xs text-gray-400">MS.NO: {o.importedMSNO}</span>}
                        </div>
                        <div className="text-xs text-gray-500">PF: {o.pf || "—"} · {o.mobile || "—"} · Received: {o.dateReceived}</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-3">
                      <div className="text-xs font-medium text-gray-500">{done}/4</div>
                      <div className="w-20 bg-gray-200 rounded-full h-2"><div className={`h-2 rounded-full transition-all ${done === 4 ? "bg-green-500" : "bg-blue-500"}`} style={{width:`${(done/4)*100}%`}}/></div>
                      {/* Reject button moved to inline below */}
                    </div>
                  </div>
                  {/* Editing mode */}
                  {editingIdx === idx ? (
                    <div className="mb-3 bg-blue-50 border border-blue-200 rounded-lg p-4">
                      <h4 className="text-xs font-bold text-blue-900 uppercase mb-3">Edit Member Details</h4>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {editableFields.map(f => (
                          <div key={f.key} className={f.full ? "col-span-2 md:col-span-4" : ""}>
                            <label className="text-xs font-medium text-gray-600 block mb-0.5">{f.label}</label>
                            <input type="text" value={editData[f.key] || ""} onChange={e => editField(f.key, e.target.value)}
                              className="w-full border border-gray-300 rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white"/>
                          </div>
                        ))}
                      </div>
                      <div className="flex gap-2 mt-3">
                        <button onClick={saveEdit} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition flex items-center gap-1.5"><Check size={14}/>Save Changes</button>
                        <button onClick={cancelEdit} className="text-gray-500 px-4 py-2 rounded-lg text-sm hover:bg-gray-100 transition">Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <>
                      {/* Show details (read-only) */}
                      {(isImported || o.sowo || o.centre || o.zone || o.address) && (
                        <div className={`grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-1 mb-3 rounded-lg p-3 text-xs ${isImported ? "bg-purple-50" : "bg-gray-50"}`}>
                          {[["Title",o.title],["S/o W/o",o.sowo],["PF",o.pf],["Centre",o.centre],["Zone",o.zone],["Address",o.address],["DOJ",o.doj],["Category",o.category],["Email",o.email],["Mobile",o.mobile],["DOB",o.dob],["Blood Group",o.bloodGroup],["Retirement",o.dor],["Branch Retired",o.branchRetired]].map(([label,val]) =>
                            val ? <div key={label}><span className="text-gray-400 uppercase">{label}:</span> <span className="text-gray-700 font-medium">{val}</span></div> : null
                          )}
                        </div>
                      )}
                      <div className="flex items-center gap-2 mb-3">
                        <button onClick={() => startEdit(idx)} className="flex items-center gap-1.5 text-xs text-blue-700 hover:text-blue-900 font-medium px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-50 transition">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                          Edit Details
                        </button>
                        <button onClick={() => removeApp(idx)} className="flex items-center gap-1.5 text-xs text-red-500 hover:text-red-700 font-medium px-3 py-1.5 rounded-lg border border-red-200 hover:bg-red-50 transition">
                          <XCircle size={12}/>Reject & Remove
                        </button>
                      </div>
                    </>
                  )}
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                    {ticks.map(t => (
                      <button key={t} onClick={() => toggle(idx, t)}
                        className={`flex items-center gap-2 px-3 py-2 rounded-lg border text-sm font-medium transition ${
                          o[t] === "Y" ? "bg-green-50 border-green-300 text-green-800" : "bg-gray-50 border-gray-200 text-gray-500 hover:bg-blue-50 hover:border-blue-300"
                        }`}>
                        {o[t] === "Y" ? <CheckCircle size={16} className="text-green-600"/> : <div className="w-4 h-4 rounded-full border-2 border-gray-300"/>}
                        {tickLabels[t]}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   MEMBER LIST (INPUTS tab)
   ═══════════════════════════════════════════════════════════════════════════ */
function MemberList({ members, nav, refresh, zones }) {
  const [search, setSearch] = useState("");
  const [centreF, setCentreF] = useState("ALL");
  const [statusF, setStatusF] = useState("ALL");
  const [page, setPage] = useState(1);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const PER_PAGE = 50;

  useEffect(() => { setPage(1); }, [search, centreF, statusF]);

  const allCentres = [...new Set(members.map(m => m.centre).filter(Boolean))].sort();
  const filtered = members.filter(m => {
    const q = search.toLowerCase();
    const ms = !q || String(m.name||"").toLowerCase().includes(q) || String(m.pf||"").toLowerCase().includes(q) || String(m.msno||"").includes(q) || String(m.mobile||"").includes(q) || String(m.centre||"").toLowerCase().includes(q) || String(m.email||"").toLowerCase().includes(q);
    return ms && (centreF === "ALL" || m.centre === centreF) && (statusF === "ALL" || m.status === statusF);
  });
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const paged = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  const handleStatusChange = (msno, newStatus) => {
    const idx = DB.members.findIndex(m => m.msno === msno);
    if (idx >= 0) {
      const oldStatus = DB.members[idx].status;
      if (oldStatus === newStatus) return;
      const today = new Date().toISOString().slice(0, 10);
      DB.members[idx].status = newStatus;
      DB.members[idx].dateOfChange = today;
      // Set reasonForChange so it shows in Form 7 removed section
      if (newStatus === "REMOVED") {
        DB.members[idx].reasonForChange = "REMOVED";
        DB.members[idx].notes = (DB.members[idx].notes ? DB.members[idx].notes + "; " : "") + `Status changed from ${oldStatus} to REMOVED on ${today}`;
      } else if (newStatus === "DELETED") {
        DB.members[idx].reasonForChange = "DELETED";
        DB.members[idx].notes = (DB.members[idx].notes ? DB.members[idx].notes + "; " : "") + `Deleted on ${today}`;
      } else if (newStatus === "DECEASED") {
        DB.members[idx].reasonForChange = "DECEASED";
        DB.members[idx].notes = (DB.members[idx].notes ? DB.members[idx].notes + "; " : "") + `Marked deceased on ${today}`;
      } else if (newStatus === "EXPIRED") {
        DB.members[idx].reasonForChange = "EXPIRED";
        DB.members[idx].notes = (DB.members[idx].notes ? DB.members[idx].notes + "; " : "") + `Expired on ${today}`;
      } else if (newStatus === "NON_PAYMENT") {
        DB.members[idx].reasonForChange = "NON_PAYMENT";
        DB.members[idx].notes = (DB.members[idx].notes ? DB.members[idx].notes + "; " : "") + `Non-payment on ${today}`;
      } else if (newStatus === "ACTIVE") {
        DB.members[idx].reasonForChange = "REINSTATED";
        DB.members[idx].notes = (DB.members[idx].notes ? DB.members[idx].notes + "; " : "") + `Reinstated from ${oldStatus} on ${today}`;
      }
      refresh();
    }
  };

  const handleDelete = (msno) => {
    const idx = DB.members.findIndex(m => m.msno === msno);
    if (idx >= 0) {
      const today = new Date().toISOString().slice(0, 10);
      const oldStatus = DB.members[idx].status;
      // Mark as DELETED instead of removing — so it shows in Form 7 removed
      DB.members[idx].status = "DELETED";
      DB.members[idx].dateOfChange = today;
      DB.members[idx].reasonForChange = "DELETED";
      DB.members[idx].notes = (DB.members[idx].notes ? DB.members[idx].notes + "; " : "") + `Deleted from ${oldStatus} on ${today}`;
      setConfirmDelete(null);
      refresh();
    }
  };

  const exportCSV = () => {
    const h = INPUT_FIELDS.map(f => f.label);
    const rows = filtered.map(m => INPUT_FIELDS.map(f => m[f.key] ?? ""));
    const csv = [h,...rows].map(r => r.map(c => `"${c}"`).join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv"}); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "BOIPRA-SZ_Members.csv"; a.click(); URL.revokeObjectURL(url);
  };

  const statusStyles = {
    ACTIVE: "bg-emerald-50 text-emerald-700 border-emerald-200",
    REMOVED: "bg-red-50 text-red-700 border-red-200",
    DELETED: "bg-rose-50 text-rose-700 border-rose-200",
    DECEASED: "bg-slate-100 text-slate-600 border-slate-300",
    EXPIRED: "bg-amber-50 text-amber-700 border-amber-200",
    NON_PAYMENT: "bg-orange-50 text-orange-700 border-orange-200",
  };

  return (
    <div className="space-y-4">
      {/* Delete confirmation modal */}
      {confirmDelete && (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50" onClick={() => setConfirmDelete(null)}>
          <div className="bg-white rounded-2xl shadow-2xl border p-6 max-w-sm mx-4 space-y-4" onClick={e => e.stopPropagation()}>
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0"><Trash2 size={18} className="text-red-600"/></div>
              <div>
                <h3 className="font-semibold text-slate-900 text-[15px]">Delete Member</h3>
                <p className="text-[13px] text-slate-500">This action cannot be undone.</p>
              </div>
            </div>
            <p className="text-[13px] text-slate-600">Are you sure you want to permanently delete <strong>{confirmDelete.name}</strong> (MS.NO {confirmDelete.msno})?</p>
            <div className="flex gap-2 justify-end">
              <button onClick={() => setConfirmDelete(null)} className="px-4 py-2 text-[13px] font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition">Cancel</button>
              <button onClick={() => handleDelete(confirmDelete.msno)} className="px-4 py-2 text-[13px] font-medium text-white bg-red-600 hover:bg-red-700 rounded-xl transition">Delete</button>
            </div>
          </div>
        </div>
      )}

      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <div className="flex-1 flex gap-2 w-full sm:w-auto flex-wrap mobile-stack mobile-full">
          <div className="relative flex-1 min-w-48 mobile-full">
            <Search size={16} className="absolute left-3 top-3 text-gray-400"/>
            <input type="text" placeholder="Search name, PF, M.S.NO, mobile…" value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white"/>
          </div>
          <select value={centreF} onChange={e => setCentreF(e.target.value)} className="border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white">
            <option value="ALL">All Centres</option>{allCentres.map(c => <option key={c}>{c}</option>)}
          </select>
          <select value={statusF} onChange={e => setStatusF(e.target.value)} className="border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white">
            <option value="ALL">All Status</option>{STATUSES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div className="flex gap-2">
          <button onClick={exportCSV} className="flex items-center gap-2 text-sm font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 px-4 py-2.5 rounded-xl transition border border-blue-200"><Download size={14}/>CSV</button>
          <button onClick={() => exportToExcel(filtered, DB.config)} className="flex items-center gap-2 text-sm font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-4 py-2.5 rounded-xl transition border border-emerald-200"><Download size={14}/>Excel</button>
        </div>
      </div>

      <div className="text-[12px] text-slate-500 font-medium">{filtered.length} member{filtered.length !== 1 ? "s":""}</div>

      <div className="section-card overflow-hidden">
        <div className="overflow-x-auto mobile-scroll">
          <table className="w-full mobile-small" style={{fontSize:"11px"}}>
            <thead><tr className="bg-slate-800 text-white">
              {["S.No","MS.NO","Name","S/W/D of","PF","Zone","Centre","Mobile","Status","Actions"].map(h => (
                <th key={h} className={`text-left px-2 py-2.5 font-semibold uppercase tracking-wide ${h==="Zone"?"mobile-hide":""}`} style={{fontSize:"9px"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {paged.map((m,i) => {
                const iss = getIssues(m, zones);
                const sno = (page - 1) * PER_PAGE + i + 1;
                return (
                  <tr key={m.msno} className={`border-t border-slate-100 hover:bg-blue-50/50 transition ${i%2 ? "bg-slate-50/50":"bg-white"}`}>
                    <td className="px-2 py-2 text-slate-400 text-[11px]">{sno}</td>
                    <td className="px-2 py-2 font-mono font-bold text-blue-900 text-[11px]">{m.msno}</td>

/* ═══════════════════════════════════════════════════════════════════════════
   REPORTS (FORM_6 + FORM_7)
   ═══════════════════════════════════════════════════════════════════════════ */
function Reports({ members, config }) {
  const [tab, setTab] = useState("form6");

  /* ── Financial Year helper ── */
  const getCurrentFY = () => {
    const now = new Date();
    const yr = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
    return yr;  // e.g. 2026 means FY 2026-27 (Apr 2026 – Mar 2027)
  };
  const [fyStart, setFyStart] = useState(getCurrentFY);

  const fyStartDate = `${fyStart}-04-01`;       // 1 Apr of start year
  const fyEndDate   = `${fyStart + 1}-03-31`;   // 31 Mar of end year
  const fyLabel     = `FY ${fyStart}-${String(fyStart + 1).slice(2)}`;

  /* Build FY options: from 2020-21 up to current+1 */
  const fyOptions = useMemo(() => {
    const cur = getCurrentFY();
    const opts = [];
    for (let y = 2020; y <= cur + 1; y++) opts.push(y);
    return opts;
  }, []);

  /* ── Normalize any date string to YYYY-MM-DD for comparison ── */
  const toISO = (d) => {
    if (!d) return "";
    if (typeof d === "number") {
      // Excel serial date
      const dt = new Date((d - 25569) * 86400000);
      return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth()+1).padStart(2,"0")}-${String(dt.getUTCDate()).padStart(2,"0")}`;
    }
    if (d instanceof Date && !isNaN(d.getTime())) return d.toISOString().slice(0, 10);
    if (typeof d === "string") {
      const s = d.trim();
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
      // Handle DD/MM/YYYY or MM/DD/YYYY — smart detection
      const m = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})$/);
      if (m) {
        let p1 = Number(m[1]), p2 = Number(m[2]), yr = m[3];
        // If first part > 12, it must be DD (DD/MM/YYYY)
        if (p1 > 12) return `${yr}-${String(p2).padStart(2,"0")}-${String(p1).padStart(2,"0")}`;
        // If second part > 12, it must be DD (MM/DD/YYYY)
        if (p2 > 12) return `${yr}-${String(p1).padStart(2,"0")}-${String(p2).padStart(2,"0")}`;
        // Both <= 12: assume DD/MM/YYYY (Indian/European format)
        return `${yr}-${String(p2).padStart(2,"0")}-${String(p1).padStart(2,"0")}`;
      }
      const m2 = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2})$/);
      if (m2) {
        const yr = Number(m2[3]) > 50 ? `19${m2[3]}` : `20${m2[3]}`;
        let p1 = Number(m2[1]), p2 = Number(m2[2]);
        if (p1 > 12) return `${yr}-${String(p2).padStart(2,"0")}-${String(p1).padStart(2,"0")}`;
        if (p2 > 12) return `${yr}-${String(p1).padStart(2,"0")}-${String(p2).padStart(2,"0")}`;
        return `${yr}-${String(p2).padStart(2,"0")}-${String(p1).padStart(2,"0")}`;
      }
      // Fallback: try native Date parse
      const dt = new Date(s);
      if (!isNaN(dt.getTime()) && dt.getFullYear() > 1900) return dt.toISOString().slice(0, 10);
    }
    return String(d);
  };

  /* ── Data filtered by FY ── */
  const isActive = (m) => String(m.status || "").toUpperCase() === "ACTIVE";
  const active = members.filter(m => isActive(m)).sort((a,b) => a.msno - b.msno);
  const nonActive = members.filter(m => !isActive(m));

  // Members added during this FY: tagged as NEW_MEMBER with dateOfChange in FY range
  const addedInFY = members.filter(m => {
    const isNew = String(m.notes || "").toUpperCase().includes("NEW_MEMBER") || String(m.notes || "").toUpperCase().includes("NEW MEMBER");
    if (!isNew) return false;
    const doc = toISO(m.dateOfChange);
    return doc && doc >= fyStartDate && doc <= fyEndDate;
  }).sort((a,b) => a.msno - b.msno);

  // Members removed during this FY (non-active with dateOfChange in FY range)
  const removedInFY = nonActive.filter(m => {
    const d = toISO(m.dateOfChange);
    return d && d >= fyStartDate && d <= fyEndDate;
  }).sort((a,b) => a.msno - b.msno);

  // All-time removed (for when user wants to see all non-active members regardless of FY)
  const allRemoved = nonActive.sort((a,b) => a.msno - b.msno);

  /* ── Reconciliation calculation ── */
  // Opening + Added − Removed = Closing (active count)
  // Opening = Closing − Added + Removed
  const closingBalance = active.length;
  const addedCount = addedInFY.length;
  const removedCount = removedInFY.length;
  const openingBalance = closingBalance - addedCount + removedCount;

  /* ── Reconciliation expandable sections ── */
  const [showAdded, setShowAdded] = useState(false);
  const [showRemoved, setShowRemoved] = useState(false);

  const handlePrint = () => { window.print(); };

  const tabDefs = [
    ["reconcile","Reconciliation"],
    ["form6","Form 6 — Member Register"],
    ["form7new","Form 7 — New Members"],
    ["form7del","Form 7 — Removed"],
    ["form7","Form 7 — Combined"],
    ["masterlist","Master List"]
  ];

  const statusLabel = (s) => {
    if (!s) return "Unknown";
    const map = { "NON_PAYMENT":"Non-Payment", "REMOVED":"Removed", "DELETED":"Deleted", "DECEASED":"Deceased", "RESIGNED":"Resigned", "TRANSFERRED":"Transferred", "EXPIRED":"Expired" };
    return map[s] || map[s.toUpperCase()] || s;
  };

  /* ── Summary by removal reason ── */
  const removalBreakdown = useMemo(() => {
    const counts = {};
    removedInFY.forEach(m => {
      const reason = m.reasonForChange || m.status || "Unknown";
      counts[reason] = (counts[reason] || 0) + 1;
    });
    return Object.entries(counts).sort((a,b) => b[1] - a[1]);
  }, [removedInFY]);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between no-print">
        <div><h2 className="text-lg font-bold text-gray-900">Statutory Reports</h2><p className="text-sm text-gray-500">Form 6, Form 7, and Reconciliation for Registrar of Societies.</p></div>
      </div>

      <div className="flex items-center gap-3 flex-wrap no-print">
        <div className="flex flex-wrap gap-1.5">
          {tabDefs.map(([id,label]) => (
            <button key={id} onClick={() => setTab(id)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${tab === id ? "bg-blue-900 text-white shadow-sm" : "bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 hover:text-gray-900"}`}>{label}</button>
          ))}
        </div>

        {/* FY Selector — shown on all tabs */}
        <div className="flex items-center gap-2 ml-auto">
          <label className="text-sm font-medium text-gray-700">FY:</label>
          <select value={fyStart} onChange={e => setFyStart(Number(e.target.value))} className="border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-white font-medium focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            {fyOptions.map(y => <option key={y} value={y}>{y}-{String(y+1).slice(2)}</option>)}
          </select>
        </div>
      </div>

      {/* ═══════ RECONCILIATION TAB ═══════ */}
      {tab === "reconcile" && (
        <div className="space-y-4">
          {/* Reconciliation Formula Card */}
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h3 className="text-base font-bold text-gray-900 mb-1">Membership Reconciliation — {fyLabel}</h3>
            <p className="text-xs text-gray-500 mb-4">Opening + New Members − Removed = Closing Balance (Form 6 Active Count)</p>

            <div className="grid grid-cols-7 gap-2 text-center">
              <div className="bg-blue-50 rounded-lg p-4 border border-blue-200">

          {/* MASTER LIST — All Details */}

                <col style={{width:"3%"}}/><col style={{width:"4%"}}/><col style={{width:"3%"}}/><col style={{width:"8%"}}/>

const KB_CATEGORIES = ["General","Insurance","Membership","Newsletters","Finance","Circulars","Rules & Bylaws","Other"];

async function extractPDFText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n";
  }
  return text.trim();
}

function extractExcelText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array" });
        let text = "";
        wb.SheetNames.forEach(name => {
          text += `--- Sheet: ${name} ---\n`;
          const ws = wb.Sheets[name];
          const csv = XLSX.utils.sheet_to_csv(ws);
          text += csv + "\n\n";
        });
        resolve(text.trim());
      } catch(err) { reject(err.message); }
    };
    reader.onerror = () => reject("Failed to read file");
    reader.readAsArrayBuffer(file);
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function chunkText(text, maxLen = 1500) {
  if (!text || text.length <= maxLen) return [text || ""];
  const sentences = text.split(/(?<=[.!?\n])\s+/);
  const chunks = [];
  let current = "";
  sentences.forEach(s => {
    if ((current + " " + s).length > maxLen && current) {
      chunks.push(current.trim());
      current = s;
    } else {
      current += (current ? " " : "") + s;
    }
  });
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

function searchKB(query, kb, topN = 5) {
  const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 2);
  if (!words.length) return [];
  const scored = [];
  kb.forEach(doc => {
    (doc.chunks || []).forEach((chunk, ci) => {
      const lower = chunk.toLowerCase();
      let score = 0;
      words.forEach(w => {
        const matches = (lower.match(new RegExp(w, "gi")) || []).length;
        score += matches;
      });
      if (score > 0) scored.push({ docId: doc.id, docTitle: doc.title, category: doc.category, chunkIdx: ci, chunk, score });
    });
  });
  return scored.sort((a, b) => b.score - a.score).slice(0, topN);
}

function KnowledgeBaseView({ refresh }) {
  const [docs, setDocs] = useState([...DB.knowledgeBase]);
  const [uploading, setUploading] = useState(false);
  const [uploadMsg, setUploadMsg] = useState("");
  const [expandedDoc, setExpandedDoc] = useState(null);
  const [category, setCategory] = useState("General");
  const [addNote, setAddNote] = useState(false);
  const [noteTitle, setNoteTitle] = useState("");
  const [noteText, setNoteText] = useState("");
  const [noteCat, setNoteCat] = useState("General");
  const [search, setSearch] = useState("");
  const fileRef = useRef(null);

  const syncDocs = () => { setDocs([...DB.knowledgeBase]); refresh(); };

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true); setUploadMsg("");
    try {
      const ext = file.name.split(".").pop().toLowerCase();
      let text = "", imageData = null, docType = "text";

      if (ext === "pdf") {
        docType = "pdf";
        text = await extractPDFText(file);
      } else if (["xlsx","xls","csv"].includes(ext)) {
        docType = "excel";
        text = await extractExcelText(file);
      } else if (["png","jpg","jpeg","gif","webp","bmp"].includes(ext)) {
        docType = "image";
        imageData = await fileToBase64(file);
        text = `[Image: ${file.name}]`; // Placeholder — actual content sent to Gemini as image
      } else {
        docType = "text";
        text = await file.text();
      }

      const doc = {
        id: "kb-" + Date.now(),
        title: file.name.replace(/\.[^.]+$/, ""),
        type: docType,
        category: category,
        content: text,
        imageData: imageData,
        chunks: chunkText(text),
        uploadedAt: new Date().toISOString().slice(0, 10),
        size: file.size,
      };
      DB.knowledgeBase.push(doc);
      syncDocs();
      setUploadMsg(`Uploaded "${doc.title}" — ${doc.chunks.length} text chunks indexed.`);
    } catch(err) {
      setUploadMsg("Error: " + (typeof err === "string" ? err : err.message || "Upload failed"));
    }
    setUploading(false);
    if (fileRef.current) fileRef.current.value = "";
  };

  const addTextNote = () => {
    if (!noteTitle.trim() || !noteText.trim()) return;
    const doc = {
      id: "kb-" + Date.now(),
      title: noteTitle.trim(),
      type: "text",
      category: noteCat,
      content: noteText.trim(),
      chunks: chunkText(noteText.trim()),
      uploadedAt: new Date().toISOString().slice(0, 10),
      size: noteText.length,
    };
    DB.knowledgeBase.push(doc);
    syncDocs();
    setNoteTitle(""); setNoteText(""); setAddNote(false);
    setUploadMsg(`Note "${doc.title}" saved.`);
  };

  const deleteDoc = (id) => {
    DB.knowledgeBase = DB.knowledgeBase.filter(d => d.id !== id);
    syncDocs();
  };

  const typeColor = { pdf: "bg-red-100 text-red-700", excel: "bg-green-100 text-green-700", image: "bg-purple-100 text-purple-700", text: "bg-blue-100 text-blue-700" };

  const filtered = docs.filter(d => {
    if (!search) return true;
    const q = search.toLowerCase();
    return d.title.toLowerCase().includes(q) || d.category.toLowerCase().includes(q) || (d.content || "").toLowerCase().includes(q);
  });

  return (
    <div className="max-w-4xl mx-auto space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-lg font-bold text-gray-900">Knowledge Base</h2>
          <p className="text-sm text-gray-500">Upload documents for the AI chatbot to reference. {docs.length} document{docs.length !== 1 ? "s" : ""} stored.</p>
        </div>
        <div className="flex gap-2">
          <button onClick={() => setAddNote(!addNote)} className="bg-white border border-blue-300 text-blue-900 px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-50 transition">
            <Plus size={16}/>Add Note
          </button>
        </div>
      </div>

      {/* Upload Area */}
      <div className="bg-white rounded-xl shadow-sm border p-5">
        <h3 className="font-semibold text-gray-900 text-sm mb-3">Upload Document</h3>
        <div className="flex flex-wrap gap-3 items-end">
          <div>
            <label className="text-xs font-medium text-gray-600 block mb-1">Category</label>
            <select value={category} onChange={e => setCategory(e.target.value)} className="border rounded-lg px-3 py-2 text-sm bg-white">
              {KB_CATEGORIES.map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div className="flex-1 min-w-48">
            <label className="text-xs font-medium text-gray-600 block mb-1">File (PDF, Excel, Image, or Text)</label>
            <input ref={fileRef} type="file" accept=".pdf,.xlsx,.xls,.csv,.txt,.md,.doc,.png,.jpg,.jpeg,.gif,.webp" onChange={handleUpload}
              className="w-full border rounded-lg px-3 py-2 text-sm file:mr-3 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
          </div>
          {uploading && <div className="flex items-center gap-2 text-sm text-blue-700"><RefreshCw size={14} className="animate-spin"/>Processing...</div>}
        </div>
        {uploadMsg && <p className={`text-sm mt-2 ${uploadMsg.startsWith("Error") ? "text-red-600" : "text-green-700"}`}>{uploadMsg}</p>}
      </div>

      {/* Add Note Form */}
      {addNote && (
        <div className="bg-blue-50 rounded-xl border border-blue-200 p-5 space-y-3">
          <h3 className="font-semibold text-blue-900 text-sm">Add Text Note</h3>
          <div className="flex gap-3">
            <div className="flex-1">
              <label className="text-xs font-medium text-gray-600 block mb-1">Title</label>
              <input type="text" value={noteTitle} onChange={e => setNoteTitle(e.target.value)} placeholder="e.g. Insurance Claim Process" className="w-full border rounded-lg px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="text-xs font-medium text-gray-600 block mb-1">Category</label>
              <select value={noteCat} onChange={e => setNoteCat(e.target.value)} className="border rounded-lg px-3 py-2 text-sm bg-white">
                {KB_CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <textarea value={noteText} onChange={e => setNoteText(e.target.value)} rows={6} placeholder="Paste or type information here..."
            className="w-full border rounded-lg px-3 py-2.5 text-sm"/>
          <div className="flex gap-2">
            <button onClick={addTextNote} className="bg-blue-900 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-blue-800">Save Note</button>
            <button onClick={() => setAddNote(false)} className="text-gray-500 px-4 py-2 rounded-lg text-sm hover:bg-gray-100">Cancel</button>
          </div>
        </div>
      )}

      {/* Search */}
      {docs.length > 0 && (
        <div className="relative">
          <Search size={16} className="absolute left-3 top-3 text-gray-400"/>
          <input type="text" placeholder="Search documents..." value={search} onChange={e => setSearch(e.target.value)}
            className="w-full pl-10 pr-4 py-2.5 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
      )}

      {/* Document List */}
      <div className="space-y-2">
        {filtered.length === 0 && docs.length > 0 && <p className="text-gray-400 text-sm text-center py-6">No documents match your search.</p>}
        {filtered.length === 0 && docs.length === 0 && (
          <div className="bg-white rounded-xl shadow-sm border p-12 text-center text-gray-400">
            <Database size={40} className="mx-auto mb-3 text-gray-300"/>
            <p className="font-medium mb-1">Knowledge Base is empty</p>
            <p className="text-sm">Upload PDFs, Excel files, images, or add text notes for the AI chatbot to reference.</p>
          </div>
        )}
        {filtered.map(doc => (
          <div key={doc.id} className="bg-white rounded-xl shadow-sm border p-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3 min-w-0">
                <span className={`text-xs font-bold px-2 py-1 rounded ${typeColor[doc.type] || "bg-gray-100 text-gray-700"}`}>{typeIcon[doc.type] || "DOC"}</span>
                <div className="min-w-0">
                  <div className="font-semibold text-gray-900 truncate">{doc.title}</div>
                  <div className="text-xs text-gray-500">{doc.category} · {doc.uploadedAt} · {doc.chunks?.length || 0} chunks · {doc.size > 1024*1024 ? `${(doc.size/1024/1024).toFixed(1)} MB` : `${Math.round(doc.size/1024)} KB`}</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => setExpandedDoc(expandedDoc === doc.id ? null : doc.id)} className="text-xs text-blue-700 hover:underline font-medium">
                  {expandedDoc === doc.id ? "Hide" : "Preview"}
                </button>
                <button onClick={() => deleteDoc(doc.id)} className="text-gray-300 hover:text-red-500 transition"><Trash2 size={16}/></button>
              </div>
            </div>
            {expandedDoc === doc.id && (
              <div className="mt-3 bg-gray-50 rounded-lg p-3 max-h-64 overflow-y-auto">
                {doc.type === "image" && doc.imageData ? (
                  <img src={doc.imageData} alt={doc.title} className="max-w-full max-h-48 rounded"/>
                ) : (
                  <pre className="text-xs text-gray-700 whitespace-pre-wrap font-mono">{(doc.content || "").slice(0, 3000)}{(doc.content || "").length > 3000 ? "\n\n... (truncated)" : ""}</pre>
                )}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   AI CHATBOT
   ═══════════════════════════════════════════════════════════════════════════ */
function ChatView({ members, config }) {
  const [messages, setMessages] = useState([
    { role: "assistant", text: `Hello! I'm the ${config.shortName || "BOIPRA-SZ"} AI assistant. Ask me anything about the association — membership, insurance, newsletters, or any documents in the Knowledge Base. I can also look up member information.` }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const buildContext = (query) => {
    // Search knowledge base
    const kbResults = searchKB(query, DB.knowledgeBase, 5);
    let context = "";
    if (kbResults.length) {
      context += "=== RELEVANT KNOWLEDGE BASE DOCUMENTS ===\n";
      kbResults.forEach(r => { context += `[${r.docTitle} | ${r.category}]:\n${r.chunk}\n\n`; });
    }

    // Check if query mentions members, and add summary stats
    const qLower = query.toLowerCase();
    if (qLower.includes("member") || qLower.includes("active") || qLower.includes("how many") || qLower.includes("total") || qLower.includes("zone") || qLower.includes("centre")) {
      const active = members.filter(m => m.status === "ACTIVE");
      const zones = {};
      active.forEach(m => { const z = m.zone || "Unknown"; zones[z] = (zones[z] || 0) + 1; });
      context += `=== MEMBERSHIP SUMMARY ===\nTotal members: ${members.length}\nActive: ${active.length}\n`;
      context += `Removed: ${members.filter(m => m.status === "REMOVED").length}\nDeceased: ${members.filter(m => m.status === "DECEASED").length}\n`;
      context += `Zones: ${Object.entries(zones).sort((a,b)=>b[1]-a[1]).map(([z,n])=>`${z}(${n})`).join(", ")}\n\n`;
    }

    // If query seems to be about a specific person, search members
    const nameMatch = members.filter(m => {
      const n = (m.name || "").toLowerCase();
      return qLower.split(/\s+/).some(w => w.length > 3 && n.includes(w));
    }).slice(0, 5);
    if (nameMatch.length > 0 && nameMatch.length < 10) {
      context += "=== MATCHING MEMBERS ===\n";
      nameMatch.forEach(m => {
        context += `MS.NO ${m.msno}: ${m.title} ${m.name} | PF: ${m.pf} | Status: ${m.status} | Zone: ${m.zone} | Centre: ${m.centre} | Mobile: ${m.mobile} | DOJ: ${m.doj} | Email: ${m.email}\n`;
      });
      context += "\n";
    }

    return context;
  };

  const sendMessage = async () => {
    const text = input.trim();
    if (!text || loading) return;
    setInput("");
    const userMsg = { role: "user", text };
    setMessages(prev => [...prev, userMsg]);
    setLoading(true);

    try {
      const apiKey = getGeminiKey();
      if (!apiKey) throw new Error("No Gemini API key configured. Go to Settings → AI Chat to add your API key.");

      const context = buildContext(text);
      const orgName = config.associationName || config.shortName || "BOIPRA-SZ";

      const systemInstruction = [
        `You are the AI assistant for ${orgName}, a Bank of India Pensioners' Association.`,
        "You help members and admins with questions about membership, insurance, dues, newsletters, and association matters.",
        "Answer based on the provided context documents and member data. If the context doesn't contain enough information, say so honestly.",
        "Be helpful, respectful, and concise. Most users are senior citizens who are retired bank employees.",
        "Format responses in a clear, easy-to-read way. Use simple language.",
        "If asked about specific members, only share info that's in the provided context.",
        "Do not make up information that isn't in the context.",
      ].join("\n");

      // Build conversation contents for Gemini
      const contents = [];
      const history = messages.slice(-8);
      history.forEach(msg => {
        contents.push({ role: msg.role === "user" ? "user" : "model", parts: [{ text: msg.text }] });
      });

      let userMessage = "";
      if (context && context.trim()) {
        userMessage += "Here is relevant context to help answer the question:\n\n" + context + "\n\n---\n\n";
      }
      userMessage += "User question: " + text;
      contents.push({ role: "user", parts: [{ text: userMessage }] });

      const model = getGeminiModel();
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemInstruction }] },
          contents,
          generationConfig: { temperature: 0.7, maxOutputTokens: 1024, topP: 0.9 },
          safetySettings: [
            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_ONLY_HIGH" },
            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_ONLY_HIGH" },
            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_ONLY_HIGH" },
            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_ONLY_HIGH" },
          ],
        }),
      });

      if (!resp.ok) {
        const errBody = await resp.json().catch(() => ({}));
        const errMsg = errBody?.error?.message || `Gemini API returned status ${resp.status}`;
        throw new Error(errMsg);
      }

      const data = await resp.json();
      let reply = "";
      if (data.candidates && data.candidates.length > 0) {
        const candidate = data.candidates[0];
        if (candidate.content && candidate.content.parts) {
          reply = candidate.content.parts.map(p => p.text || "").join("");
        }
      }
      if (!reply) throw new Error("Gemini returned an empty response. The query may have been blocked by safety filters.");

      setMessages(prev => [...prev, { role: "assistant", text: reply }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: "assistant", text: `Sorry, I encountered an error: ${err.message}`, isError: true }]);
    }
    setLoading(false);
  };

  const handleKeyDown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  return (
    <div className="max-w-3xl mx-auto flex flex-col" style={{height:"calc(100vh - 200px)"}}>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-lg font-bold text-gray-900 flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-600"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            AI Assistant
          </h2>
          <p className="text-sm text-gray-500">Powered by Gemini {getGeminiKey() ? <span className="text-emerald-600">· Connected</span> : <span className="text-amber-600">· No API key — go to Settings → AI Chat</span>} · {DB.knowledgeBase.length} doc{DB.knowledgeBase.length !== 1 ? "s" : ""}</p>
        </div>
        <button onClick={() => setMessages([messages[0]])} className="text-xs text-gray-500 hover:text-red-500 font-medium px-3 py-1.5 rounded-lg border hover:bg-gray-50">Clear Chat</button>
      </div>

      {/* Chat Messages */}
      <div className="flex-1 overflow-y-auto space-y-3 mb-4 pr-1">
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
            <div className={`max-w-[85%] rounded-2xl px-4 py-3 text-sm ${
              m.role === "user"
                ? "bg-blue-900 text-white rounded-br-md"
                : m.isError
                  ? "bg-red-50 border border-red-200 text-red-800 rounded-bl-md"
                  : "bg-white border border-gray-200 text-gray-800 rounded-bl-md shadow-sm"
            }`}>
              <div className="whitespace-pre-wrap">{m.text}</div>
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex justify-start">
            <div className="bg-white border border-gray-200 rounded-2xl rounded-bl-md px-4 py-3 shadow-sm">
              <div className="flex gap-1.5">
                <span className="w-2 h-2 rounded-full bg-gray-400 animate-bounce" style={{animationDelay:"0ms"}}/>
                <span className="w-2 h-2 rounded-full bg-gray-400 animate-bounce" style={{animationDelay:"150ms"}}/>
                <span className="w-2 h-2 rounded-full bg-gray-400 animate-bounce" style={{animationDelay:"300ms"}}/>
              </div>
            </div>
          </div>
        )}
        <div ref={chatEndRef}/>
      </div>

      {/* Input */}
      <div className="border-t pt-3">
        <div className="flex gap-2">
          <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown}
            placeholder="Ask about membership, insurance, newsletters..." rows={2}
            className="flex-1 border rounded-xl px-4 py-3 text-sm resize-none focus:ring-2 focus:ring-blue-500 outline-none"/>
          <button onClick={sendMessage} disabled={loading || !input.trim()}
            className="bg-blue-900 text-white px-5 rounded-xl font-semibold hover:bg-blue-800 transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p className="text-xs text-gray-400 mt-2">Press Enter to send. AI responses are based on your Knowledge Base documents and member data.</p>
      </div>
    </div>
  );
}

function SettingsView({ config, zones, refresh, members, onImport, onReset, onExport, useSheet, onPushToSheet, onRefreshFromSheet }) {
  const [tab, setTab] = useState("config");
  const [cfg, setCfg] = useState({...config});
  const [zns, setZns] = useState(zones.map(z => ({...z})));
  const [saved, setSaved] = useState(false);
  const [importMsg, setImportMsg] = useState("");
  const [importErr, setImportErr] = useState("");
  const [confirmReset, setConfirmReset] = useState(false);
  const [newPw, setNewPw] = useState("");
  const [pwSaved, setPwSaved] = useState(false);
  const [geminiKey, setGeminiKeyState] = useState(getGeminiKey());
  const [geminiSaved, setGeminiSaved] = useState(false);
  const [geminiTesting, setGeminiTesting] = useState(false);
  const [geminiTestResult, setGeminiTestResult] = useState(null);
  const fileRef = useRef(null);

  const saveConfig = () => { Object.assign(DB.config, cfg); refresh(); setSaved(true); setTimeout(() => setSaved(false), 2000); };
  const saveZones = () => { DB.zones = zns.map(z => ({...z})); refresh(); setSaved(true); setTimeout(() => setSaved(false), 2000); };
  const addZone = () => { setZns(z => [...z, {zone:"NEW_ZONE", cities:""}]); };
  const removeZone = (i) => { setZns(z => z.filter((_,j) => j !== i)); };

  const handleFileImport = async (e, mode) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportMsg(""); setImportErr("");
    try {
      const result = await onImport(file, mode);
      if (mode === "monthly" && typeof result === "object" && !result.mode) {
        const parts = [];
        if (result.updated > 0) parts.push(`${result.updated} existing members updated`);
        if (result.queued > 0) parts.push(`${result.queued} new members sent to Pending Queue for approval`);
        if (result.skippedDupPF > 0) parts.push(`${result.skippedDupPF} skipped (PF already exists under different MS.NO)`);
        if (parts.length === 0) parts.push("No changes detected");
        setImportMsg(parts.join(". ") + ".");
      } else if (result && result.mode === "replace") {
        setImportMsg(`Replaced with ${result.total} members: ${result.activeCount} Active, ${result.removedCount} Removed, ${result.deceasedCount} Deceased. ${result.newTagged} tagged as NEW_MEMBER.`);
      } else {
        setImportMsg(`Successfully ${mode === "replace" ? "replaced with" : "merged"} ${typeof result === "number" ? result : "?"} members.`);
      }
      refresh();
    } catch (err) {
      setImportErr(typeof err === "string" ? err : "Import failed. Check the file format.");
    }
    if (fileRef.current) fileRef.current.value = "";
  };

  const doReset = async () => {
    await onReset();
    setConfirmReset(false);
  };

  const configFields = [
    { key:"associationName", label:"Association Name" },
    { key:"shortName", label:"Short Name" },
    { key:"regNo", label:"Registration Number" },
    { key:"address", label:"Registered Address" },
    { key:"email", label:"Official Email" },
    { key:"admissionFee", label:"Admission Fee (Rs.)", type:"number" },
    { key:"annualSub", label:"Annual Subscription (Rs.)", type:"number" },
    { key:"twoYearSub", label:"2-Year Subscription (Rs.)", type:"number" },
    { key:"bankAccountNo", label:"Bank Account Number" },
    { key:"bankAccountName", label:"Bank Account Name" },
    { key:"bankName", label:"Bank Name" },
  ];

  return (
    <div className="max-w-3xl mx-auto space-y-4">
      <h2 className="text-lg font-bold text-gray-900">Settings</h2>
      <div className="flex gap-2">
        <button onClick={() => setTab("config")} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab==="config"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}>Association Config</button>
        <button onClick={() => setTab("zones")} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab==="zones"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}>Zone Rules</button>
        <button onClick={() => setTab("data")} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab==="data"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}><span className="flex items-center gap-1.5"><Database size={14}/>Data Management</span></button>
        <button onClick={() => setTab("aichat")} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab==="aichat"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}><span className="flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>AI Chat</span></button>
        <button onClick={() => setTab("security")} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab==="security"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}>Security</button>
      </div>

      {saved && <div className="bg-green-50 border border-green-300 text-green-800 px-4 py-2 rounded-lg text-sm flex items-center gap-2"><Check size={16}/>Saved successfully!</div>}

      {tab === "config" && (
        <div className="bg-white rounded-xl shadow-sm border p-6 space-y-4">
          {configFields.map(f => (
            <div key={f.key}>
              <label className="block text-sm font-semibold text-gray-700 mb-1">{f.label}</label>
              <input type={f.type || "text"} value={cfg[f.key]} onChange={e => setCfg(c => ({...c,[f.key]:f.type==="number" ? Number(e.target.value) : e.target.value}))}
                className="w-full border rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
            </div>
          ))}
          <button onClick={saveConfig} className="bg-blue-900 text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-800 transition flex items-center gap-2"><Save size={16}/>Save Config</button>
        </div>
      )}

      {tab === "zones" && (
        <div className="bg-white rounded-xl shadow-sm border p-6 space-y-4">
          <p className="text-sm text-gray-500">These are the 11 canonical zones. Members with zones not in this list get flagged as BadZone.</p>
          {zns.map((z, i) => (
            <div key={i} className="flex gap-3 items-start">
              <div className="w-40">
                <input value={z.zone} onChange={e => { const n=[...zns]; n[i].zone = e.target.value.toUpperCase(); setZns(n); }}
                  className="w-full border rounded-lg px-3 py-2 text-sm font-bold"/>
              </div>
              <div className="flex-1">
                <input value={z.cities} onChange={e => { const n=[...zns]; n[i].cities = e.target.value; setZns(n); }}
                  className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="Cities…"/>
              </div>
              <button onClick={() => removeZone(i)} className="text-gray-300 hover:text-red-500 mt-2"><Trash2 size={16}/></button>
            </div>
          ))}
          <div className="flex gap-3">
            <button onClick={addZone} className="flex items-center gap-1 text-sm text-blue-700 hover:underline"><Plus size={14}/>Add Zone</button>
            <button onClick={saveZones} className="bg-blue-900 text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-800 transition flex items-center gap-2"><Save size={16}/>Save Zones</button>
          </div>
        </div>
      )}

      {tab === "data" && (
        <div className="space-y-4">
          {/* Google Sheets Connection */}
          <div className={`bg-white rounded-xl shadow-sm border p-6 ${useSheet ? "border-green-300" : ""}`}>
            <h3 className="font-semibold text-gray-900 mb-2 flex items-center gap-2"><Database size={18}/>Google Sheets Connection</h3>
            {getScriptUrl() ? (
              <div className="space-y-3">
                <div className="flex items-center gap-2"><CheckCircle size={16} className="text-green-600"/><span className="text-sm text-green-800 font-medium">Connected to Google Sheet</span></div>
                <div className="bg-gray-50 rounded-lg p-2 text-xs text-gray-500 font-mono break-all">{getScriptUrl()}</div>
                <div className="flex gap-2">
                  <button onClick={onRefreshFromSheet} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-green-700 transition"><RefreshCw size={14}/>Refresh from Sheet</button>
                  <button onClick={onPushToSheet} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-700 transition"><Upload size={14}/>Push All to Sheet</button>
                  <button onClick={() => { clearScriptUrl(); window.location.reload(); }} className="text-red-500 px-4 py-2 rounded-lg text-sm hover:bg-red-50 transition">Disconnect</button>
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                <p className="text-sm text-gray-500">Not connected. Data is stored locally in this browser only.</p>
                <p className="text-sm text-gray-500">To enable multi-user access, connect a Google Sheet via Settings on the welcome screen.</p>
              </div>
            )}
          </div>

          {/* Current stats */}
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h3 className="font-semibold text-gray-900 mb-3">Current Database</h3>
            <div className="grid grid-cols-3 gap-4">
              <div className="bg-blue-50 rounded-lg p-4 text-center"><div className="text-2xl font-bold text-blue-900">{members.length}</div><div className="text-xs text-gray-500">Total Members</div></div>
              <div className="bg-green-50 rounded-lg p-4 text-center"><div className="text-2xl font-bold text-green-700">{members.filter(m => m.status === "ACTIVE").length}</div><div className="text-xs text-gray-500">Active</div></div>
              <div className="bg-purple-50 rounded-lg p-4 text-center"><div className="text-2xl font-bold text-purple-700">{DB.onboarding.length}</div><div className="text-xs text-gray-500">Pending</div></div>
            </div>
            <p className="text-xs text-gray-400 mt-3">Data is stored locally in your browser using IndexedDB. It persists even after closing the browser.</p>
          </div>

          {/* Export */}
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h3 className="font-semibold text-gray-900 mb-2">Export Data</h3>
            <p className="text-sm text-gray-500 mb-3">Download all member data as an Excel file (same format as the master workbook INPUTS sheet).</p>
            <button onClick={onExport} className="bg-green-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-green-700 transition"><Download size={16}/>Export to Excel (.xlsx)</button>
          </div>

          {/* Monthly Update (recommended) */}
          <div className="bg-white rounded-xl shadow-sm border border-green-200 p-6">
            <h3 className="font-semibold text-gray-900 mb-2 flex items-center gap-2"><Upload size={18} className="text-green-600"/>Monthly Update <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">Recommended</span></h3>
            <p className="text-sm text-gray-500 mb-3">Upload the latest monthly master list. Existing members will be updated with new data (name corrections, S/o W/o, address, etc.). Any new members will go to the <strong>Pending Queue</strong> for your review and approval before being added.</p>
            {importMsg && <div className="bg-green-50 border border-green-300 text-green-800 px-4 py-2 rounded-lg text-sm mb-3 flex items-center gap-2"><CheckCircle size={16}/>{importMsg}</div>}
            {importErr && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-lg text-sm mb-3 flex items-center gap-2"><AlertCircle size={16}/>{importErr}</div>}
            <input ref={fileRef} type="file" accept=".xlsx,.xls" className="hidden"/>
            <button onClick={() => { fileRef.current.onchange = (e) => handleFileImport(e, "monthly"); fileRef.current.click(); }}
              className="bg-green-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-green-700 transition"><Upload size={16}/>Upload Monthly Master List</button>
          </div>

          {/* Import (advanced) */}
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h3 className="font-semibold text-gray-900 mb-2">Import Data (Advanced)</h3>
            <p className="text-sm text-gray-500 mb-3">Replace or merge members from a Master Excel file. Use these only for initial setup or bulk operations.</p>
            <div className="flex gap-3">
              <button onClick={() => { fileRef.current.onchange = (e) => handleFileImport(e, "replace"); fileRef.current.click(); }}
                className="bg-blue-900 text-white px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-800 transition"><Upload size={16}/>Replace All Data</button>
              <button onClick={() => { fileRef.current.onchange = (e) => handleFileImport(e, "merge"); fileRef.current.click(); }}
                className="bg-white border border-blue-300 text-blue-900 px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-50 transition"><Upload size={16}/>Merge (add new PFs only)</button>
            </div>
          </div>

          {/* Reset */}
          <div className="bg-white rounded-xl shadow-sm border border-red-200 p-6">
            <h3 className="font-semibold text-red-700 mb-2">Danger Zone</h3>
            <p className="text-sm text-gray-500 mb-3">This will permanently delete all data from the browser. You cannot undo this. Make sure to export first.</p>
            {!confirmReset ? (
              <button onClick={() => setConfirmReset(true)} className="bg-red-100 text-red-700 px-5 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-red-200 transition"><Trash2 size={16}/>Reset Everything</button>
            ) : (
              <div className="bg-red-50 border border-red-300 rounded-lg p-4 space-y-3">
                <p className="text-sm text-red-800 font-semibold">Are you absolutely sure? All {members.length} members and settings will be deleted.</p>
                <div className="flex gap-3">
                  <button onClick={doReset} className="bg-red-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition">Yes, Delete Everything</button>
                  <button onClick={() => setConfirmReset(false)} className="text-gray-500 px-5 py-2 rounded-lg text-sm hover:bg-gray-100 transition">Cancel</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {tab === "aichat" && (
        <div className="space-y-4">
          <div className="bg-white rounded-xl shadow-sm border p-6 space-y-4">
            <div className="flex items-center gap-3 mb-2">
              <div className="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <div>
                <h3 className="font-semibold text-gray-900 text-[15px]">Gemini AI Configuration</h3>
                <p className="text-[12px] text-gray-500">Configure your Gemini API key for the AI Chat feature</p>
              </div>
            </div>

            <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 space-y-2">
              <p className="text-sm text-blue-900 font-medium">How to get a free Gemini API key:</p>
              <ol className="text-sm text-blue-800 space-y-1 ml-4" style={{listStyleType:"decimal"}}>
                <li>Go to <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" className="underline font-semibold hover:text-blue-600">Google AI Studio</a></li>
                <li>Sign in with your Google account</li>
                <li>Click "Create API Key"</li>
                <li>Copy the key and paste it below</li>
              </ol>
            </div>

            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-1.5">Gemini API Key</label>
              <div className="flex gap-2">
                <input type="password" value={geminiKey} onChange={e => setGeminiKeyState(e.target.value)}
                  placeholder="AIza..." className="flex-1 border rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-mono"/>
                <button onClick={() => {
                  setGeminiKey(geminiKey);
                  setGeminiSaved(true);
                  setGeminiTestResult(null);
                  setTimeout(() => setGeminiSaved(false), 3000);
                }} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-700 transition flex items-center gap-2">
                  <Save size={14}/>Save
                </button>
              </div>
              {geminiSaved && <p className="text-sm text-emerald-600 mt-2 flex items-center gap-1"><Check size={14}/>API key saved!</p>}
            </div>

            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-1.5">Model</label>
              <select value={getGeminiModel()} onChange={e => { setGeminiModel(e.target.value); setGeminiTestResult(null); }}
                className="w-full border rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                {GEMINI_MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
              <p className="text-xs text-gray-400 mt-1">If one model gives quota errors, try a different one. Each model has separate quota limits.</p>
            </div>

            <div className="flex gap-2 items-center flex-wrap">
              <button onClick={async () => {
                setGeminiTesting(true);
                setGeminiTestResult(null);
                try {
                  const key = geminiKey || getGeminiKey();
                  if (!key) throw new Error("No API key entered");
                  const model = getGeminiModel();
                  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      contents: [{ role: "user", parts: [{ text: "Say hello in one word." }] }],
                      generationConfig: { maxOutputTokens: 10 },
                    }),
                  });
                  if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err?.error?.message || `Status ${resp.status}`);
                  }
                  const data = await resp.json();
                  const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
                  setGeminiTestResult({ ok: true, msg: `Working with ${model}! Gemini says: "${reply.trim()}"` });
                } catch (err) {
                  setGeminiTestResult({ ok: false, msg: err.message });
                }
                setGeminiTesting(false);
              }} disabled={geminiTesting} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-emerald-700 transition flex items-center gap-2 disabled:opacity-50">
                {geminiTesting ? <><RefreshCw size={14} className="animate-spin"/>Testing...</> : <><Check size={14}/>Test Connection</>}
              </button>
              {getGeminiKey() && (
                <button onClick={() => { clearGeminiKey(); setGeminiKeyState(""); setGeminiTestResult(null); }} className="text-red-500 px-4 py-2 rounded-xl text-sm hover:bg-red-50 transition font-medium">Remove Key</button>
              )}
            </div>

            {geminiTestResult && (
              <div className={`rounded-xl p-3 text-sm ${geminiTestResult.ok ? "bg-emerald-50 border border-emerald-200 text-emerald-800" : "bg-red-50 border border-red-200 text-red-800"}`}>
                <div className="flex items-start gap-2">
                  {geminiTestResult.ok ? <CheckCircle size={16} className="mt-0.5 flex-shrink-0"/> : <AlertCircle size={16} className="mt-0.5 flex-shrink-0"/>}
                  <div>
                    <p>{geminiTestResult.msg}</p>
                    {!geminiTestResult.ok && geminiTestResult.msg.includes("quota") && (
                      <p className="mt-2 text-xs font-medium">Try selecting a different model above — each model has separate quotas. "Gemini 1.5 Flash 8B" or "Gemini 2.0 Flash Lite" often have available quota.</p>
                    )}
                  </div>
                </div>
              </div>
            )}

            <div className="border-t pt-4 mt-4 space-y-2">
              <p className="text-xs text-gray-400">Your API key is stored in this browser's localStorage only. It is sent directly to Google's Gemini API — not through any third-party server.</p>
              <p className="text-xs text-gray-400">If you keep getting quota errors on all models, your Google Cloud project may need billing enabled. Go to <a href="https://console.cloud.google.com/billing" target="_blank" rel="noopener" className="underline">Google Cloud Console → Billing</a> and link a billing account to the project that owns your API key. Even with billing enabled, Gemini usage within free-tier limits won't be charged.</p>
            </div>
          </div>
        </div>
      )}

      {tab === "security" && (
        <div className="bg-white rounded-xl shadow-sm border p-6 space-y-4">
          <h3 className="font-semibold text-gray-900">App Password</h3>
          <p className="text-sm text-gray-500">Change the shared access password for the app. Current password: <code className="bg-gray-100 px-2 py-0.5 rounded text-blue-900 font-bold">{APP_PASSWORD}</code></p>
          <p className="text-sm text-amber-600 flex items-center gap-2"><AlertTriangle size={14}/>Note: The password is set in the code. To change it permanently, edit the APP_PASSWORD value in index.html and re-upload to GitHub.</p>
          <div className="flex gap-3 items-center">
            <input type="text" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="New password" className="border rounded-lg px-3 py-2.5 text-sm w-64 focus:ring-2 focus:ring-blue-500 outline-none"/>
          </div>
          <p className="text-xs text-gray-400">Password is case-insensitive. Share it with authorized committee members only.</p>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOUNT
   ═══════════════════════════════════════════════════════════════════════════ */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
