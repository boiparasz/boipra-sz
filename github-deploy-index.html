/* ═══════════════════════════════════════════════════════════════════════════
   PASSWORD GATE — simple shared password before app loads
   ═══════════════════════════════════════════════════════════════════════════ */
const APP_PASSWORD = "BOIPARASZ2026";
const AUTH_KEY = "boipra_auth";

function PasswordGate({ onUnlock }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState("");
  const [show, setShow] = useState(false);

  // Check if already authenticated this session
  useEffect(() => {
    if (sessionStorage.getItem(AUTH_KEY) === "1") onUnlock();
  }, []);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (pw.trim().toUpperCase() === APP_PASSWORD) {
      sessionStorage.setItem(AUTH_KEY, "1");
      onUnlock();
    } else {
      setError("Incorrect password. Please try again.");
      setPw("");
    }
  };

  return (
    <div className="min-h-screen bg-blue-900 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center">
        <div className="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-4">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2 className="text-xl font-bold text-blue-900 mb-1">BOIPRA - South Zone</h2>
        <p className="text-gray-500 text-sm mb-6">Enter the access password to continue</p>
        <form onSubmit={handleSubmit}>
          <div className="relative mb-4">
            <input type={show ? "text" : "password"} value={pw} onChange={e => setPw(e.target.value)} placeholder="Enter password"
              className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none text-center text-lg tracking-widest"
              autoFocus/>
            <button type="button" onClick={() => setShow(!show)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              {show ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                : <Eye size={18}/>}
            </button>
          </div>
          {error && <p className="text-red-500 text-sm mb-3">{error}</p>}
          <button type="submit" className="w-full bg-blue-900 text-white py-3 rounded-xl font-semibold hover:bg-blue-800 transition">
            Unlock App
          </button>
        </form>
        <p className="text-gray-400 text-xs mt-4">Contact your BOIPRA-SZ administrator for the password</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   INDEXED-DB PERSISTENCE — data survives browser close
   ═══════════════════════════════════════════════════════════════════════════ */
const IDB_NAME = "BOIPRA_SZ_DB";
const IDB_VER  = 1;
const IDB_STORE = "appData";

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSave(key, val) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbLoad(key) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbClear() {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

    zone:"", centre:"", mobile:"", email:"", address:"",
    dob:"", doj:"", reasonForChange:"", dateOfChange:"",

  Object.entries(SHEET_TO_APP).forEach(([sheetH, appK]) => {

  // Normalize status
  if (m.status) m.status = String(m.status).toUpperCase().trim();

    body: JSON.stringify(body),

  if (!resp.ok) throw new Error("Network error: " + resp.status);
  return resp.json();
}

function excelDateToStr(v) {
  if (!v) return "";
  if (typeof v === "number") {
    // Excel serial date -> JS Date
    const d = new Date((v - 25569) * 86400000);
    const yyyy = d.getUTCFullYear();
    const mm = String(d.getUTCMonth() + 1).padStart(2, "0");
    const dd = String(d.getUTCDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  if (typeof v === "string") {
    const s = v.trim();
    // Already YYYY-MM-DD?
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // DD.MM.YYYY or DD/MM/YYYY or DD-MM-YYYY
    const m = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})$/);
    if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
    // MM/DD/YYYY (US format) — ambiguous, but if month > 12 swap
    const m2 = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2})$/);
    if (m2) {
      const yr = Number(m2[3]) > 50 ? `19${m2[3]}` : `20${m2[3]}`;
      return `${yr}-${m2[2].padStart(2,"0")}-${m2[1].padStart(2,"0")}`;
    }
    // Try native Date parse as fallback
    const d = new Date(s);
    if (!isNaN(d.getTime()) && d.getFullYear() > 1900) return d.toISOString().slice(0,10);
    return s;
  }
  return String(v);
}

function importExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array", cellDates: false });
        // Try INPUTS sheet first, then common names, then first sheet
        const sheetName = wb.SheetNames.find(n => n.toUpperCase() === "INPUTS")
          || wb.SheetNames.find(n => n.toUpperCase().includes("MASTER"))
          || wb.SheetNames.find(n => n.toUpperCase().includes("MEMBER"))
          || wb.SheetNames.find(n => n.toUpperCase() === "FORM 6")
          || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
        if (raw.length < 2) { reject("Sheet has no data rows"); return; }

        // Find header row — scan first 10 rows for known column names
        let headerIdx = -1;
        const knownHeaders = ["M.S.NO", "PF_NO", "PF NO", "P F NO", "NAME", "TITLE", "CENTRE", "FP NO", "ZONE", "CONTACT NO"];
        for (let i = 0; i < Math.min(raw.length, 10); i++) {
          const row = (raw[i] || []).map(c => String(c || "").trim().toUpperCase());
          const matches = row.filter(c => knownHeaders.includes(c));
          if (matches.length >= 2) { headerIdx = i; break; }
        }
        if (headerIdx === -1) { reject("Could not find column headers. Make sure the file has columns like M.S.NO, NAME, PF NO, etc."); return; }

        const headers = (raw[headerIdx] || []).map(c => String(c || "").trim());

        // Build column index map — try exact match, then uppercase, then with normalized spaces, then collapsed spaces
        const colMap = {};
        headers.forEach((h, idx) => {
          const hUp = h.toUpperCase();
          const hNorm = h.replace(/\s+/g, " ").trim();
          const hNormUp = hNorm.toUpperCase();
          const hCollapsed = h.replace(/\s+/g, "").trim(); // "P F NO" -> "PFNO"
          const hCollapsedUp = hCollapsed.toUpperCase();
          const key = IMPORT_MAP[h] || IMPORT_MAP[hUp] || IMPORT_MAP[hNorm] || IMPORT_MAP[hNormUp] || IMPORT_MAP[hCollapsed] || IMPORT_MAP[hCollapsedUp];
          if (key && key !== "_sno" && key !== "_age") colMap[idx] = key;
        });

        if (Object.keys(colMap).length < 2) { reject("Could not map enough columns. Found: " + headers.filter(Boolean).join(", ")); return; }

        const dateFields = ["dob", "doj", "dor", "dateOfChange", "applicationDate"];
        const members = [];
        let maxMSNO = 0;

        for (let r = headerIdx + 1; r < raw.length; r++) {
          const row = raw[r];
          if (!row || row.every(c => c === null || c === undefined || c === "")) continue;
          const member = {
            msno: 0, title: "Mr.", name: "", sowo: "", pf: "", status: "ACTIVE",
            zone: "", centre: "", mobile: "", email: "", address: "",
            dob: "", doj: "", reasonForChange: "", dateOfChange: "",
            category: "OFF", dor: "", branchRetired: "", branchPension: "",
            familyPensioner: "", familyContact: "", bloodGroup: "",
            applicationDate: "", admissionFeePaid: "Y", subscriptionYears: 1,
            paymentMode: "", paymentRef: "", amountPaid: 0, notes: "",
          };

          Object.entries(colMap).forEach(([colIdx, key]) => {
            let val = row[parseInt(colIdx)];
            if (val === null || val === undefined) val = "";
            if (dateFields.includes(key)) val = excelDateToStr(val);
            else val = typeof val === "number" ? val : String(val).trim();
            member[key] = val;
          });

          // Ensure msno is a number
          member.msno = parseInt(member.msno) || 0;
          if (member.msno > maxMSNO) maxMSNO = member.msno;

          // If zone is empty but centre exists, copy centre as zone
          if (!member.zone && member.centre) member.zone = member.centre.toUpperCase();
          // If centre is empty but zone exists, copy zone as centre
          if (!member.centre && member.zone) member.centre = member.zone;

          // Skip completely empty rows (no name and no pf)
          if (!member.name && !member.pf) continue;
          // Normalize status to uppercase
          if (!member.status) member.status = "ACTIVE";
          else member.status = String(member.status).toUpperCase().trim();
          // Map common status variants
          if (member.status === "EXPIRED" || member.status === "DEAD") member.status = "DECEASED";
          if (member.status === "INACTIVE" || member.status === "NON-PAYMENT" || member.status === "NONPAYMENT") member.status = "NON_PAYMENT";
          // Populate reasonForChange from status if not set
          if (!member.reasonForChange && member.status !== "ACTIVE") member.reasonForChange = member.status;
          members.push(member);
        }

        // Assign MSNOs to rows that don't have one
        members.forEach((m, i) => { if (!m.msno) m.msno = maxMSNO + i + 1; });

        resolve({ members, maxMSNO: Math.max(maxMSNO, ...members.map(m => m.msno)) });
      } catch (err) { reject(err.message || "Failed to parse Excel file"); }
    };
    reader.onerror = () => reject("Failed to read file");
    reader.readAsArrayBuffer(file);
  });
}

function exportToExcel(members, config) {
  const headers = ["M.S.NO","PF_NO","TITLE","NAME","S_W_D_O","CATEGORY","CENTRE","ZONE_RAW","ADDRESS","CONTACT_1","CONTACT_2","EMAIL","DOB_RAW","DOJ_RAW","STATUS_IN","DATE_OF_CHANGE","REMARKS","DATE_OF_RETIREMENT","BRANCH_RETIRED_FROM","BRANCH_PENSION_DRAWN","FAMILY_PENSIONER","FAMILY_CONTACT","BLOOD_GROUP","APPLICATION_DATE","ADMISSION_FEE_PAID","SUBSCRIPTION_YEARS","PAYMENT_MODE","PAYMENT_REF"];
  const keyMap = {};
  Object.entries(IMPORT_MAP).forEach(([excelH, appK]) => { keyMap[excelH] = appK; });

  const data = [headers];
  members.forEach(m => {
    data.push(headers.map(h => m[keyMap[h]] ?? ""));
  });

  const ws = XLSX.utils.aoa_to_sheet(data);
  // Set column widths
  ws["!cols"] = headers.map(h => ({ wch: Math.max(h.length + 2, 14) }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "INPUTS");
  XLSX.writeFile(wb, `BOIPRA-SZ_Members_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function getAge(dob) {
  if (!dob) return null;
  const d = new Date(dob), now = new Date();
  let a = now.getFullYear() - d.getFullYear();
  if (now.getMonth() < d.getMonth() || (now.getMonth() === d.getMonth() && now.getDate() < d.getDate())) a--;
  return a;
}

function getIssues(m, zones) {

  if (!m.dob) issues.push("MissingDOB");
  if (!m.dor) issues.push("MissingDOR");
  if (!m.bloodGroup) issues.push("MissingBloodGroup");
  if (!m.mobile) issues.push("MissingMobile");
  if (!m.email) issues.push("MissingEmail");
  if (m.zone && !zones.find(z => z.zone === String(m.zone).toUpperCase())) issues.push("BadZone");
  return issues;
}

function getDupPFs(members) {
  const seen = {}, dups = new Set();
  members.filter(m => m.pf && m.status === "ACTIVE").forEach(m => {
    if (seen[m.pf]) dups.add(m.pf);
    seen[m.pf] = true;
  });
  return dups;
}

function WelcomeScreen({ onConnectSheet, onImport, onStartFresh }) {
  const fileRef = useRef(null);
  const [importing, setImporting] = useState(false);
  const [error, setError] = useState("");
  const [mode, setMode] = useState(""); // "" | "sheet" | "local"
  const [scriptUrl, setScriptUrlInput] = useState("");
  const [connecting, setConnecting] = useState(false);

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImporting(true); setError("");
    try {
      const result = await importExcel(file);
      onImport(result);
    } catch (err) {
      setError(typeof err === "string" ? err : "Failed to import file. Make sure it's a valid .xlsx file.");
    }
    setImporting(false);
  };

  const handleConnect = async () => {
    if (!scriptUrl.trim()) { setError("Please paste the Apps Script URL"); return; }
    setConnecting(true); setError("");
    try {
      setScriptUrl(scriptUrl.trim());
      const res = await sheetPing();
      if (res.status === "ok") {
        onConnectSheet(scriptUrl.trim(), res.memberCount);
      } else {
        throw new Error("Unexpected response from sheet");
      }
    } catch (err) {
      clearScriptUrl();
      setError("Could not connect. Check the URL and make sure the Apps Script is deployed. Error: " + (err.message || err));
    }
    setConnecting(false);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-blue-900 flex items-center justify-center p-4">
      <div className="max-w-lg w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div className="bg-blue-900 px-8 py-8 text-center">
          <div className="w-20 h-20 rounded-full bg-blue-700 flex items-center justify-center mx-auto mb-4">
            <Users size={40} className="text-white"/>
          </div>
          <h1 className="text-white text-2xl font-bold">BOIPRA - South Zone</h1>
          <p className="text-blue-300 text-sm mt-1">Membership Management System</p>
        </div>

        <div className="p-8 space-y-5">
          {!mode && <>
            <div className="text-center">
              <h2 className="text-xl font-bold text-gray-900">Welcome! Choose how to store data.</h2>
            </div>

            <button onClick={() => setMode("sheet")}
              className="w-full bg-green-600 text-white px-6 py-4 rounded-xl font-semibold flex items-center justify-center gap-3 hover:bg-green-700 transition">
              <Database size={20}/> Connect to Google Sheet (multi-user)
            </button>
            <p className="text-xs text-gray-400 text-center -mt-3">Recommended — multiple people can access the same data</p>

            <div className="relative"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-200"/></div><div className="relative flex justify-center"><span className="bg-white px-4 text-sm text-gray-400">or</span></div></div>

            <button onClick={() => setMode("local")}
              className="w-full border-2 border-gray-300 text-gray-600 px-6 py-4 rounded-xl font-medium flex items-center justify-center gap-3 hover:border-blue-400 hover:text-blue-700 transition">
              <Save size={20}/> Use local browser only (single user)
            </button>
          </>}

          {mode === "sheet" && <>
            <button onClick={() => { setMode(""); setError(""); }} className="text-sm text-blue-600 hover:underline flex items-center gap-1"><ChevronLeft size={14}/>Back</button>
            <div className="text-center">
              <h2 className="text-lg font-bold text-gray-900">Connect to Google Sheet</h2>
              <p className="text-gray-500 text-sm mt-1">Paste the Apps Script Web App URL below. See the setup guide for how to get this.</p>
            </div>

            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-1">Apps Script URL</label>
              <input type="text" value={scriptUrl} onChange={e => setScriptUrlInput(e.target.value)}
                placeholder="https://script.google.com/macros/s/ABC.../exec"
                className="w-full border rounded-lg px-3 py-3 text-sm focus:ring-2 focus:ring-green-500 outline-none"/>
            </div>

            {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2"><AlertCircle size={16}/>{error}</div>}

            <button onClick={handleConnect} disabled={connecting}
              className="w-full bg-green-600 text-white px-6 py-3 rounded-xl font-semibold flex items-center justify-center gap-3 hover:bg-green-700 transition disabled:opacity-50">
              {connecting ? <RefreshCw size={18} className="animate-spin"/> : <Database size={18}/>}
              {connecting ? "Connecting..." : "Connect & Load Data"}
            </button>

            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-blue-800 space-y-2">
              <p className="font-semibold">Quick Setup (5 minutes):</p>
              <p>1. Open <a href="https://sheets.google.com" target="_blank" className="underline">Google Sheets</a> with your boiparasz@gmail.com account</p>
              <p>2. Create a new blank spreadsheet</p>
              <p>3. Go to Extensions → Apps Script</p>
              <p>4. Paste the Code.gs code from the setup guide</p>
              <p>5. Click Run → setup (and grant permissions)</p>
              <p>6. Click Deploy → New deployment → Web app → Anyone → Deploy</p>
              <p>7. Copy the URL and paste it above</p>
            </div>
          </>}

          {mode === "local" && <>
            <button onClick={() => { setMode(""); setError(""); }} className="text-sm text-blue-600 hover:underline flex items-center gap-1"><ChevronLeft size={14}/>Back</button>
            <div className="text-center">
              <h2 className="text-lg font-bold text-gray-900">Local Browser Storage</h2>
              <p className="text-gray-500 text-sm mt-2">Data stays on this computer only. Import your Master Excel or start fresh.</p>
            </div>

            <button onClick={() => fileRef.current?.click()} disabled={importing}
              className="w-full bg-blue-900 text-white px-6 py-4 rounded-xl font-semibold flex items-center justify-center gap-3 hover:bg-blue-800 transition disabled:opacity-50">
              {importing ? <RefreshCw size={20} className="animate-spin"/> : <Upload size={20}/>}
              {importing ? "Importing..." : "Import Master Excel (.xlsx)"}
            </button>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile} className="hidden"/>

            {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2"><AlertCircle size={16}/>{error}</div>}

            <button onClick={onStartFresh} className="w-full border-2 border-dashed border-gray-300 text-gray-600 px-6 py-3 rounded-xl font-medium flex items-center justify-center gap-3 hover:border-blue-400 hover:text-blue-700 transition">
              <Plus size={20}/> Start with empty database
            </button>
          </>}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [authenticated, setAuthenticated] = useState(sessionStorage.getItem(AUTH_KEY) === "1");
  const [loading, setLoading] = useState(true);
  const [hasData, setHasData] = useState(false);
  const [useSheet, setUseSheet] = useState(false); // Google Sheets mode
  const [syncing, setSyncing] = useState(false);
  const [view, setView] = useState("dashboard");
  const [members, setMembers] = useState([]);
  const [config, setConfig] = useState({ ...CONFIG_DEFAULTS });
  const [zones, setZones] = useState(ZONE_DEFAULTS.map(z => ({...z})));
  const [onboarding, setOnboarding] = useState([]);
  const [applications, setApplications] = useState([]); // from Google Sheet APPLICATIONS tab
  const [selectedMSNO, setSelectedMSNO] = useState(null);
  const [saveStatus, setSaveStatus] = useState("");
  const [syncError, setSyncError] = useState("");
  const saveTimer = useRef(null);

  // Load on startup: try Google Sheet first, then IndexedDB
  useEffect(() => {
    (async () => {
      try {
        const url = getScriptUrl();
        if (url) {
          // Try loading from Google Sheet (always succeeds if URL is hardcoded)
          try {
            const sheetMembers = await sheetFetchMembers();
            DB.members = sheetMembers;
            DB.nextMSNO = sheetMembers.length > 0 ? Math.max(...sheetMembers.map(m => m.msno)) + 1 : 1001;
            setMembers([...DB.members]);
            // Also fetch applications from public form
            try { const apps = await sheetFetchApplications(); setApplications(apps); } catch(e) { /* ok if no apps yet */ }
            setUseSheet(true);
            setHasData(true);
            setLoading(false);
            return;
          } catch (e) {
            console.warn("Sheet load failed, trying local:", e);
            // If default URL is set, still show the app (offline mode)
            if (getScriptUrl() === DEFAULT_SCRIPT_URL) {
              setUseSheet(true);
              setHasData(true);
            }
          }
        }
        // Fall back to IndexedDB
        const saved = await idbLoad("appState");
        if (saved && saved.members && saved.members.length > 0) {
          DB.members = saved.members;
          DB.nextMSNO = saved.nextMSNO || (Math.max(...saved.members.map(m => m.msno)) + 1);
          DB.nextAppNo = saved.nextAppNo || 1;
          DB.config = saved.config || { ...CONFIG_DEFAULTS };
          DB.zones = saved.zones || ZONE_DEFAULTS.map(z => ({...z}));
          DB.onboarding = saved.onboarding || [];
          DB.knowledgeBase = saved.knowledgeBase || [];
          setMembers([...DB.members]);
          setConfig({...DB.config});
          setZones(DB.zones.map(z => ({...z})));
          setOnboarding([...DB.onboarding]);
          setHasData(true);
        }
      } catch (e) { console.warn("Load failed:", e); }
      setLoading(false);
    })();
  }, []);

  // Auto-refresh from Google Sheet every 60 seconds for multi-user sync
  useEffect(() => {
    if (!authenticated || !getScriptUrl()) return;
    const interval = setInterval(async () => {
      try {
        const sheetMembers = await sheetFetchMembers();
        DB.members = sheetMembers;
        DB.nextMSNO = sheetMembers.length > 0 ? Math.max(...sheetMembers.map(m => m.msno)) + 1 : 1001;
        setMembers([...DB.members]);
        try { const apps = await sheetFetchApplications(); setApplications(apps); } catch(e) {}
      } catch (e) { /* silent fail on background sync */ }
    }, 60000);
    return () => clearInterval(interval);
  }, [authenticated]);

  // Save: to Google Sheet (if connected) AND IndexedDB (always as backup)
  const persistToDB = useCallback(() => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        // Always save to IndexedDB as local backup
        await idbSave("appState", {
          members: DB.members, nextMSNO: DB.nextMSNO, nextAppNo: DB.nextAppNo,
          config: DB.config, zones: DB.zones, onboarding: DB.onboarding, knowledgeBase: DB.knowledgeBase,
        });
        // If Google Sheet is connected, also sync there
        if (getScriptUrl()) {
          setSyncing(true); setSyncError("");
          try {
            await sheetSaveAllMembers(DB.members);
            setSaveStatus("synced");
          } catch (e) {
            setSyncError("Sync failed - saved locally");
            setSaveStatus("local");
          }
          setSyncing(false);
        } else {
          setSaveStatus("saved");
        }
        setTimeout(() => setSaveStatus(""), 3000);
      } catch (e) { console.warn("Save failed:", e); }
    }, 800);
  }, []);

  const refresh = () => {
    setMembers([...DB.members]);
    setOnboarding([...DB.onboarding]);
    setConfig({ ...DB.config });
    setZones(DB.zones.map(z => ({...z})));
    persistToDB();
  };

  const nav = (v, msno) => {
    setView(v); setSelectedMSNO(msno || null);
    // Push to browser history so Back button works within the app
    try { window.history.pushState({ view: v, msno: msno || null }, "", ""); } catch(e) {}
  };

  // Handle browser Back button — go to previous app view instead of leaving the page
  useEffect(() => {
    const handler = (e) => {
      if (e.state && e.state.view) {
        setView(e.state.view);
        setSelectedMSNO(e.state.msno || null);
      } else {
        // No state — go to dashboard (the "home" view)
        setView("dashboard");
        setSelectedMSNO(null);
      }
    };
    window.addEventListener("popstate", handler);
    // Set initial state
    try { window.history.replaceState({ view: "dashboard", msno: null }, "", ""); } catch(e) {}
    return () => window.removeEventListener("popstate", handler);
  }, []);

  // Refresh from Google Sheet
  const refreshFromSheet = async () => {
    if (!getScriptUrl()) return;
    setSyncing(true); setSyncError("");
    try {
      const sheetMembers = await sheetFetchMembers();
      DB.members = sheetMembers;
      DB.nextMSNO = sheetMembers.length > 0 ? Math.max(...sheetMembers.map(m => m.msno)) + 1 : 1001;
      setMembers([...DB.members]);
      try { const apps = await sheetFetchApplications(); setApplications(apps); } catch(e) {}
      setSaveStatus("synced");
      setTimeout(() => setSaveStatus(""), 2000);
    } catch (e) {
      setSyncError("Could not refresh from sheet: " + e.message);
    }
    setSyncing(false);
  };

  // Handle Google Sheet connection from Welcome screen
  const handleConnectSheet = async (url, memberCount) => {
    setScriptUrl(url);
    setUseSheet(true);
    setSyncing(true);
    try {
      if (memberCount > 0) {
        const sheetMembers = await sheetFetchMembers();
        DB.members = sheetMembers;
        DB.nextMSNO = sheetMembers.length > 0 ? Math.max(...sheetMembers.map(m => m.msno)) + 1 : 1001;
      } else {
        await sheetInitSheet();
        DB = makeEmptyDB();
      }
      setMembers([...DB.members]);
      setHasData(true);
    } catch (e) { setSyncError("Connected but failed to load: " + e.message); }
    setSyncing(false);
  };

  // Handle Excel import from Welcome screen
  const handleImport = async (result) => {
    DB.members = result.members;
    DB.nextMSNO = result.maxMSNO + 1;
    setHasData(true);
    // If sheet is connected, push to sheet
    if (getScriptUrl()) {
      try { await sheetSaveAllMembers(DB.members); } catch(e) { console.warn("Sheet push failed:", e); }
    }
    refresh();
  };

  const handleStartFresh = () => {
    DB = makeEmptyDB();
    setHasData(true);
    if (getScriptUrl()) { sheetInitSheet().catch(()=>{}); }
    refresh();
  };

  // Handle import from Settings (replace, merge, or monthly update)
  const handleSettingsImport = async (file, mode) => {
    try {
      const result = await importExcel(file);
      if (mode === "replace") {
        DB.members = result.members;
        DB.nextMSNO = result.maxMSNO + 1;
        // Return detailed breakdown for user verification
        const activeCount = result.members.filter(m => String(m.status || "").toUpperCase() === "ACTIVE").length;
        const removedCount = result.members.filter(m => String(m.status || "").toUpperCase() === "REMOVED").length;
        const deceasedCount = result.members.filter(m => String(m.status || "").toUpperCase() === "DECEASED").length;
        const newTagged = result.members.filter(m => String(m.notes || "").toUpperCase().includes("NEW_MEMBER")).length;
        refresh();
        return { total: result.members.length, activeCount, removedCount, deceasedCount, newTagged, mode: "replace" };
      } else if (mode === "monthly") {
        // Monthly Update: update existing members, send new ones to pending queue
        const existingByMSNO = {};
        DB.members.forEach(m => { existingByMSNO[String(m.msno)] = m; });
        // Build PF lookup using string keys for reliable type-safe comparison
        const existingPFs = new Set(DB.members.map(m => String(m.pf || "").trim()));
        let updated = 0, queued = 0, skippedDupPF = 0;
        result.members.forEach(imported => {
          const msnoKey = String(imported.msno);
          const existing = existingByMSNO[msnoKey];
          if (existing) {
            // Update existing member fields (only overwrite non-empty imported values)
            const updateFields = ["name","title","sowo","pf","category","centre","zone","address",
              "mobile","familyContact","email","dob","doj","dor","branchRetired","branchPension",
              "familyPensioner","bloodGroup","status","dateOfChange","notes","reasonForChange"];
            let changed = false;
            updateFields.forEach(f => {
              const impVal = imported[f] != null ? String(imported[f]).trim() : "";
              const curVal = existing[f] != null ? String(existing[f]).trim() : "";
              if (impVal && impVal !== curVal) {
                existing[f] = imported[f];
                changed = true;
              }
            });
            if (changed) updated++;
          } else {
            // New member not in current DB by MSNO
            const importedPF = String(imported.pf || "").trim();
            if (importedPF && existingPFs.has(importedPF)) {
              skippedDupPF++;  // PF already exists under different MSNO — skip but count
            } else {
              // Non-ACTIVE members (REMOVED, DECEASED, etc.) go straight to master — no queue needed
              const impStatus = String(imported.status || "").toUpperCase();
              if (impStatus && impStatus !== "ACTIVE") {
                imported.msno = imported.msno || DB.nextMSNO++;
                if (imported.msno >= DB.nextMSNO) DB.nextMSNO = imported.msno + 1;
                DB.members.push(imported);
                if (importedPF) existingPFs.add(importedPF);
                updated++;  // count as processed, not queued
              } else {
                // ACTIVE members without matching MSNO — queue for manual approval
                DB.onboarding.push({
                  appNo: DB.nextAppNo++,
                  dateReceived: new Date().toISOString().slice(0,10),
                  name: imported.name || "",
                  pf: imported.pf || "",
                  mobile: typeof imported.mobile === "number" ? String(imported.mobile) : (imported.mobile || ""),
                  email: imported.email || "",
                  title: imported.title || "",
                  sowo: imported.sowo || "",
                  category: imported.category || "",
                  centre: imported.centre || "",
                  zone: imported.zone || "",
                  address: imported.address || "",
                  doj: imported.doj || "",
                  dob: imported.dob || "",
                  dor: imported.dor || "",
                  branchRetired: imported.branchRetired || "",
                  branchPension: imported.branchPension || "",
                  bloodGroup: imported.bloodGroup || "",
                  importedMSNO: imported.msno || "",
                  importedStatus: imported.status || "",
                  importedDateOfChange: imported.dateOfChange || "",
                  importedNotes: imported.notes || "",
                  importedReasonForChange: imported.reasonForChange || "",
                  source: "monthly-import",
                  formReceived:"N", pfVerified:"N", paymentReceived:"N", enteredInInputs:"N"
                });
                queued++;
              }
            }
          }
        });
        refresh();
        return { updated, queued, skippedDupPF };
      } else {
        const existingPFs = new Set(DB.members.map(m => m.pf));
        let added = 0;
        result.members.forEach(m => {
          if (!existingPFs.has(m.pf)) {
            m.msno = DB.nextMSNO++;
            DB.members.push(m);
            added++;
          }
        });
        refresh();
        return added;
      }
      refresh();
      return result.members.length;
    } catch (err) { throw err; }
  };

  const handleReset = async () => {
    await idbClear();
    clearScriptUrl();
    DB = makeEmptyDB();
    setMembers([]); setOnboarding([]);
    setConfig({...CONFIG_DEFAULTS});
    setZones(ZONE_DEFAULTS.map(z => ({...z})));
    setHasData(false); setUseSheet(false);
  };

  const issues = useMemo(() => {
    const dupPFs = getDupPFs(members);
    const all = [];
    members.filter(m => m.status === "ACTIVE").forEach(m => {
      const mi = getIssues(m, zones);
      if (dupPFs.has(m.pf)) mi.push("DuplicatePF");
      mi.forEach(issue => all.push({ msno: m.msno, name: m.name, pf: m.pf, issue }));
    });
    return all;
  }, [members, zones]);

  // Password gate
  if (!authenticated) {
    return <PasswordGate onUnlock={() => setAuthenticated(true)}/>;
  }

  if (loading) {
    return <div className="min-h-screen bg-blue-900 flex items-center justify-center"><div className="text-center"><RefreshCw size={32} className="text-white animate-spin mx-auto mb-4"/><p className="text-blue-300">Loading...</p></div></div>;
  }

  if (!hasData) {
    return <WelcomeScreen onConnectSheet={handleConnectSheet} onImport={handleImport} onStartFresh={handleStartFresh}/>;
  }

  const tabs = [
    { id:"dashboard", label:"Dashboard", icon:<BarChart3 size={16}/> },
    { id:"enroll", label:"New Member", icon:<UserPlus size={16}/> },
    { id:"onboarding", label:"Pending Queue", icon:<ClipboardList size={16}/> },
    { id:"members", label:"Members", icon:<Users size={16}/> },
    { id:"issues", label:"Issues", icon:<AlertTriangle size={16}/> },
    { id:"reports", label:"Reports", icon:<FileText size={16}/> },
    { id:"kb", label:"Knowledge Base", icon:<Database size={16}/> },
    { id:"chat", label:"AI Chat", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> },
    { id:"settings", label:"Settings", icon:<Settings size={16}/> },
  ];

  return (
    <div className="min-h-screen" style={{background:'#f7f8fa'}}>
      <header className="no-print" style={{background:'linear-gradient(180deg, #0c1d36 0%, #112240 100%)'}}>
        <div className="max-w-[1360px] mx-auto px-5">
          {/* Top bar: Brand + Status + Actions */}
          <div className="flex items-center justify-between h-[52px]">
            <button onClick={() => nav("dashboard")} className="flex items-center gap-2.5 hover:opacity-90 transition group">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'linear-gradient(135deg, #2563eb, #3b82f6)'}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v4M12 14v4M16 14v4"/></svg>
              </div>
              <div className="min-w-0">
                <h1 className="text-white font-semibold text-[14px] leading-tight tracking-[-0.01em]">BOIPRA<span className="text-blue-400 font-normal mx-1">—</span><span className="font-medium text-white/90">South Zone</span></h1>
              </div>
            </button>

            <div className="flex items-center gap-2">
              {/* Sync status */}
              <div className="flex items-center gap-2 mr-1">
                {syncing && <RefreshCw size={13} className="text-blue-400 animate-spin"/>}
                {saveStatus === "synced" && <span className="text-emerald-400 text-[11px] flex items-center gap-1 font-medium"><Check size={11}/>Synced</span>}
                {saveStatus === "saved" && <span className="text-emerald-400 text-[11px] flex items-center gap-1 font-medium"><Check size={11}/>Saved</span>}
                {saveStatus === "local" && <span className="text-amber-400 text-[11px] flex items-center gap-1 font-medium"><AlertCircle size={11}/>Offline</span>}
                {syncError && <span className="text-red-400 text-[11px] mobile-hide">{syncError}</span>}
              </div>
              {getScriptUrl() && <button onClick={refreshFromSheet} title="Refresh from Google Sheet" className="w-8 h-8 rounded-lg flex items-center justify-center text-white/40 hover:text-white/80 hover:bg-white/[0.06] transition"><RefreshCw size={14}/></button>}
              <button onClick={() => { sessionStorage.removeItem(AUTH_KEY); window.location.reload(); }} title="Logout" className="w-8 h-8 rounded-lg flex items-center justify-center text-white/40 hover:text-white/80 hover:bg-white/[0.06] transition">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </div>
          </div>

          {/* Navigation row */}
          <nav className="flex items-center gap-0.5 overflow-x-auto mobile-nav pb-px -mb-px" style={{scrollbarWidth:'none'}}>
            {tabs.map(t => {
              const isActive = view === t.id || (view === "member-detail" && t.id === "members");
              return (
                <button key={t.id} onClick={() => nav(t.id)} className={`nav-item ${isActive ? "active" : ""}`}>
                  {t.icon}<span className="mobile-hide">{t.label}</span>
                  {t.id === "issues" && issues.length > 0 && <span className="nav-badge nav-badge-red">{issues.length}</span>}

/* ── Animated count-up hook ── */
function useCountUp(target, duration = 1200) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (typeof target !== "number" || target === 0) { setVal(target); return; }
    let start = null, raf;
    const step = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
      setVal(Math.round(eased * target));
      if (progress < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return val;
}

/* ── SVG Donut Chart ── */
function ZoneBarChart({ data }) {
  const sorted = [...data].sort((a, b) => b.value - a.value);
  const total = sorted.reduce((s, d) => s + d.value, 0) || 1;
  const maxVal = sorted[0]?.value || 1;
  const [hover, setHover] = useState(null);
  const barColors = ["#3b82f6","#6366f1","#14b8a6","#06b6d4","#8b5cf6","#0ea5e9","#2563eb","#7c3aed","#0d9488","#0284c7","#4f46e5"];

  return (
    <div className="space-y-1.5">
      {sorted.map((d, i) => {
        const pct = Math.round((d.value / total) * 100);
        const widthPct = Math.max((d.value / maxVal) * 100, 2);
        const isHovered = hover === i;
        return (
          <div key={i} className="flex items-center gap-2 group cursor-pointer" style={{opacity: hover !== null && !isHovered ? 0.45 : 1, transition:"opacity 0.15s"}}
            onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}>
            <span className="text-[11px] text-gray-500 font-medium w-[90px] text-right truncate flex-shrink-0" title={d.label}>{d.label}</span>
            <div className="flex-1 h-[18px] bg-gray-50 rounded overflow-hidden relative">
              <div className="h-full rounded transition-all duration-300" style={{width:`${widthPct}%`, background: barColors[i % barColors.length], opacity: isHovered ? 1 : 0.8}}/>
            </div>
            <span className="text-[11px] font-bold text-gray-800 w-[28px] text-right flex-shrink-0">{d.value}</span>
            <span className="text-[10px] text-gray-400 w-[32px] text-right flex-shrink-0">{pct}%</span>
          </div>
        );
      })}
      <div className="flex items-center justify-between pt-1.5 mt-1 border-t border-gray-100">
        <span className="text-[11px] font-semibold text-gray-600 ml-[98px]">Total</span>
        <span className="text-[11px] font-bold text-gray-900 mr-[36px]">{total}</span>
      </div>
    </div>
  );
}

/* ── SVG Area Chart (membership growth) ── */
function GrowthChart({ data, height = 160 }) {
  if (!data.length) return <p className="text-gray-400 text-sm">No join-date data available.</p>;
  const maxVal = Math.max(...data.map(d => d.cumulative)) || 1;
  const w = 100, h = 60; // viewBox units
  const pad = { l: 0, r: 2, t: 4, b: 12 };
  const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
  const pts = data.map((d, i) => ({
    x: pad.l + (i / Math.max(data.length - 1, 1)) * plotW,
    y: pad.t + plotH - (d.cumulative / maxVal) * plotH,
    ...d
  }));
  const linePath = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
  const areaPath = linePath + ` L ${pts[pts.length-1].x} ${pad.t + plotH} L ${pts[0].x} ${pad.t + plotH} Z`;
  const [hoverIdx, setHoverIdx] = useState(null);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}} preserveAspectRatio="none" className="overflow-visible">
      <defs>
        <linearGradient id="growthGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <path d={areaPath} fill="url(#growthGrad)"/>
      <path d={linePath} fill="none" stroke="#3b82f6" strokeWidth="0.8" strokeLinejoin="round"/>
      {pts.map((p, i) => (
        <g key={i} onMouseEnter={() => setHoverIdx(i)} onMouseLeave={() => setHoverIdx(null)} style={{cursor:"pointer"}}>
          <circle cx={p.x} cy={p.y} r={hoverIdx === i ? 1.8 : 1} fill={hoverIdx === i ? "#1d4ed8" : "#3b82f6"} stroke="#fff" strokeWidth="0.4"/>
          <text x={p.x} y={pad.t + plotH + 8} textAnchor="middle" fill="#94a3b8" style={{fontSize:"3.5px"}}>{p.year}</text>
          {hoverIdx === i && (
            <g>
              <rect x={p.x - 8} y={p.y - 9} width="16" height="7" rx="1" fill="#1e293b"/>
              <text x={p.x} y={p.y - 4.5} textAnchor="middle" fill="#fff" style={{fontSize:"3.5px",fontWeight:600}}>{p.cumulative}</text>
            </g>
          )}
        </g>
      ))}
    </svg>
  );
}

function Dashboard({ members, issues, onboarding, applications = [], nav, config, onExport, refreshFromSheet, useSheet }) {

  const removed = members.filter(m => m.status === "REMOVED" || m.status === "DELETED").length;
  const deceased = members.filter(m => m.status === "DECEASED").length;
  const expired = members.filter(m => m.status === "EXPIRED").length;
  const total = members.length;

  const zones = {};
  const centres = {};
  let ageSum = 0, ageN = 0;
  members.filter(m => m.status === "ACTIVE").forEach(m => {
    centres[m.centre] = (centres[m.centre] || 0) + 1;
    const z = m.zone || "Unknown";
    zones[z] = (zones[z] || 0) + 1;
    const a = getAge(m.dob); if (a) { ageSum += a; ageN++; }
  });
  const topCentres = Object.entries(centres).sort((a,b) => b[1] - a[1]);
  const maxC = topCentres.length ? topCentres[0][1] : 1;
  const totalActive = active || 1;
  const avgAge = ageN ? Math.round(ageSum / ageN) : "\u2014";

  // Zone donut data
  const zoneColors = ["#3b82f6","#6366f1","#14b8a6","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#ec4899","#22c55e","#f97316","#64748b","#a855f7"];
  const zoneData = Object.entries(zones).sort((a,b) => b[1] - a[1]).map(([label, value], i) => ({
    label, value, color: zoneColors[i % zoneColors.length]
  }));

  // Membership growth by year
  const growthData = useMemo(() => {
    const byYear = {};
    members.forEach(m => {
      if (!m.doj) return;
      const d = new Date(m.doj);
      if (isNaN(d.getTime()) || d.getFullYear() < 1990) return;
      const yr = d.getFullYear();
      byYear[yr] = (byYear[yr] || 0) + 1;
    });
    const years = Object.keys(byYear).map(Number).sort();
    if (!years.length) return [];
    let cum = 0;
    return years.map(yr => { cum += byYear[yr]; return { year: yr, added: byYear[yr], cumulative: cum }; });
  }, [members]);

  // Membership dues calculation
  const now = new Date();
  const duesInfo = useMemo(() => {
    let paidUp = 0, dueForRenewal = 0, noInfo = 0;
    members.filter(m => m.status === "ACTIVE").forEach(m => {
      if (!m.doj || !m.subscriptionYears) { noInfo++; return; }
      const doj = new Date(m.doj);
      if (isNaN(doj.getTime())) { noInfo++; return; }
      const coveredUntil = new Date(doj);
      coveredUntil.setFullYear(coveredUntil.getFullYear() + Number(m.subscriptionYears));
      if (coveredUntil > now) paidUp++;
      else dueForRenewal++;
    });
    return { paidUp, dueForRenewal, noInfo };
  }, [members]);
  const duesTotal = duesInfo.paidUp + duesInfo.dueForRenewal + duesInfo.noInfo || 1;

  // Overdue members (subscription expired)
  const overdueMembers = useMemo(() => {
    return members.filter(m => {
      if (m.status !== "ACTIVE") return false;
      if (!m.doj || !m.subscriptionYears) return false;
      const doj = new Date(m.doj);
      if (isNaN(doj.getTime())) return false;
      const coveredUntil = new Date(doj);
      coveredUntil.setFullYear(coveredUntil.getFullYear() + Number(m.subscriptionYears));
      return coveredUntil < now;
    }).map(m => {
      const doj = new Date(m.doj);
      const coveredUntil = new Date(doj);
      coveredUntil.setFullYear(coveredUntil.getFullYear() + Number(m.subscriptionYears));
      const diffMs = now - coveredUntil;
      const days = Math.floor(diffMs / 86400000);
      const overdueTxt = days > 365 ? `${Math.floor(days/365)}y ${Math.floor((days%365)/30)}m` : days > 30 ? `${Math.floor(days/30)} months` : `${days} days`;
      return { ...m, overdueDays: days, overdueTxt };
    }).sort((a,b) => b.overdueDays - a.overdueDays);
  }, [members]);

  // Upcoming birthdays
  const birthdays = useMemo(() => {
    const currentMonth = now.getMonth();
    const nextMonth = (currentMonth + 1) % 12;

    return members.filter(m => m.status === "ACTIVE" && m.dob).map(m => {
      const d = new Date(m.dob);
      if (isNaN(d.getTime())) return null;
      const bMonth = d.getMonth();
      if (bMonth !== currentMonth && bMonth !== nextMonth) return null;
      const bDay = d.getDate();
      const age = now.getFullYear() - d.getFullYear();
      const isToday = bMonth === currentMonth && bDay === today;
      const sortKey = bMonth === currentMonth ? bDay : 32 + bDay;
      return { msno: m.msno, name: m.name, date: `${bDay}/${bMonth+1}`, turnsAge: age, isToday, sortKey, bMonth };
    }).filter(Boolean).sort((a,b) => a.sortKey - b.sortKey);

  // Greeting
  const hour = now.getHours();

  const dateStr = now.toLocaleDateString("en-IN", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  const pendingTotal = onboarding.length + applications.length;

  return (
    <div className="space-y-5">
      {/* Command Center Header — Premium gradient banner */}

        <div className="absolute inset-0 opacity-[0.07]" style={{backgroundImage:'url("data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")'}}/>

/* ═══════════════════════════════════════════════════════════════════════════
   ENROLLMENT WIZARD
   ═══════════════════════════════════════════════════════════════════════════ */
function FieldInput({ field, value, onChange, error, zones }) {
  const meta = INPUT_FIELDS.find(f => f.key === field);
  if (!meta) return null;
  const cls = `w-full border rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition ${error ? "border-red-400 bg-red-50" : "border-gray-300"}`;

  if (meta.type === "select" || meta.type === "zone") {
    const opts = meta.type === "zone" ? zones.map(z => z.zone) : meta.options;
    return (
      <select value={value || ""} onChange={e => onChange(e.target.value)} className={cls + " bg-white"}>
        {(!meta.required || !value) && <option value="">— Select —</option>}
        {opts.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }
  if (meta.type === "textarea") return <textarea value={value || ""} onChange={e => onChange(e.target.value)} rows={2} className={cls + " resize-none"} placeholder={meta.placeholder || ""}/>;
  return <input type={meta.type === "tel" ? "tel" : meta.type === "number" ? "number" : meta.type === "date" ? "date" : "text"} value={value || ""} onChange={e => onChange(e.target.value)} className={cls} placeholder={meta.placeholder || ""}/>;
}

function EnrollWizard({ zones, config, onDone }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({ title:"Mr.", status:"ACTIVE", category:"OFF", admissionFeePaid:"Y", subscriptionYears:1, amountPaid:config.admissionFee + config.annualSub, zone:zones[0]?.zone || "", centre:zones[0]?.zone || "" });
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const set = (k, v) => { setForm(f => ({...f, [k]:v})); setErrors(e => { const n={...e}; delete n[k]; return n; }); };

  const validate = () => {
    const errs = {};
    ENROLL_STEPS[step].fields.forEach(f => {
      const meta = INPUT_FIELDS.find(x => x.key === f);
      if (meta?.required && !form[f]?.toString().trim()) errs[f] = `${meta.label} is required`;
      if (f === "mobile" && form[f] && !/^\d{10}$/.test(form[f])) errs[f] = "Enter 10-digit number";
      if (f === "email" && form[f] && !form[f].includes("@")) errs[f] = "Invalid email";
      if (f === "pf" && form[f] && DB.members.some(m => m.pf === form[f] && m.status === "ACTIVE")) errs[f] = "Duplicate PF!";
    });
    setErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const next = () => { if (step < 4 && validate()) setStep(s => s+1); };
  const prev = () => { if (step > 0) setStep(s => s-1); };

  const submit = () => {
    const today = new Date().toISOString().slice(0,10);
    const member = { ...form, msno: DB.nextMSNO++, applicationDate: today, doj: today,
      dateOfChange: today, reasonForChange: "NEW_MEMBER", notes: "NEW_MEMBER",
      subscriptionYears: parseInt(form.subscriptionYears), amountPaid: parseInt(form.amountPaid) };
    DB.members.push(member);
    setSubmitted(true);
  };

  if (submitted) {
    const m = DB.members[DB.members.length - 1];
    return (
      <div className="max-w-lg mx-auto bg-white rounded-2xl shadow-lg border p-8 text-center space-y-4">
        <div className="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto"><Check size={40} className="text-green-600"/></div>
        <h2 className="text-2xl font-bold text-gray-900">Member Enrolled!</h2>
        <p className="text-gray-600"><strong>{m.name}</strong> — <span className="font-mono bg-blue-100 text-blue-900 px-2 py-0.5 rounded">M.S.NO {m.msno}</span></p>
        <button onClick={onDone} className="bg-blue-900 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-800 transition">View All Members</button>
      </div>
    );
  }

  return (
    <div className="max-w-2xl mx-auto">
      <div className="flex items-center mb-6">
        {ENROLL_STEPS.map((s,i) => (
          <div key={i} className="flex items-center flex-shrink-0">
            <button onClick={() => i < step && setStep(i)} className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition ${i < step ? "bg-green-500 text-white" : i === step ? "bg-blue-900 text-white ring-4 ring-blue-200" : "bg-gray-200 text-gray-500"}`}>
              {i < step ? <Check size={14}/> : i+1}
            </button>
            <span className={`ml-1 text-xs font-medium hidden lg:block ${i === step ? "text-blue-900" : "text-gray-400"}`}>{s.label}</span>
            {i < ENROLL_STEPS.length - 1 && <div className={`w-6 h-0.5 mx-1 ${i < step ? "bg-green-400" : "bg-gray-200"}`}/>}
          </div>
        ))}
      </div>

      <div className="bg-white rounded-2xl shadow-lg border overflow-hidden">
        <div className="bg-blue-900 px-6 py-4 flex items-center gap-3">
          <span className="text-2xl">{ENROLL_STEPS[step].icon}</span>
          <div><h2 className="text-white font-bold text-lg">{ENROLL_STEPS[step].label}</h2><p className="text-blue-300 text-xs">Step {step+1} of {ENROLL_STEPS.length}</p></div>
        </div>

        <div className="p-6 space-y-4">
          {step < 4 ? ENROLL_STEPS[step].fields.map(f => {
            const meta = INPUT_FIELDS.find(x => x.key === f);
            return (
              <div key={f}>
                <label className="block text-sm font-semibold text-gray-700 mb-1">{meta.label}{meta.required && <span className="text-red-500 ml-1">*</span>}</label>
                <FieldInput field={f} value={form[f]} onChange={v => set(f,v)} error={errors[f]} zones={zones}/>
                {errors[f] && <p className="text-red-500 text-xs mt-1 flex items-center gap-1"><AlertCircle size={12}/>{errors[f]}</p>}
              </div>
            );
          }) : (
            <div className="space-y-3">
              <p className="text-sm text-gray-500">Review all details before submitting.</p>
              {ENROLL_STEPS.slice(0,4).map((s,si) => (
                <div key={si} className="border rounded-lg overflow-hidden">
                  <button onClick={() => setStep(si)} className="w-full bg-gray-50 px-4 py-2 flex items-center justify-between text-left hover:bg-blue-50 transition">
                    <span className="font-semibold text-sm text-gray-800">{s.icon} {s.label}</span>
                    <span className="text-xs text-blue-600">Edit</span>
                  </button>
                  <div className="px-4 py-3 grid grid-cols-2 gap-x-6 gap-y-2">
                    {s.fields.map(f => {
                      const meta = INPUT_FIELDS.find(x => x.key === f);
                      return (<div key={f}><span className="text-xs text-gray-400">{meta?.label}</span><div className="text-sm font-medium text-gray-900">{form[f] || "\u2014"}</div></div>);
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="px-6 py-4 bg-gray-50 border-t flex justify-between">
          <button onClick={prev} disabled={step===0} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition ${step===0 ? "text-gray-300" : "text-gray-700 hover:bg-gray-200"}`}><ChevronLeft size={16}/>Back</button>
          {step < 4 ? (
            <button onClick={next} className="bg-blue-900 text-white px-6 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-800 transition"><span>Next</span><ChevronRight size={16}/></button>
          ) : (
            <button onClick={submit} className="bg-green-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-green-700 transition"><Check size={16}/>Submit & Register</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   ONBOARDING QUEUE
   ═══════════════════════════════════════════════════════════════════════════ */
function OnboardingQueue({ onboarding, applications = [], refresh, nav, zones, config, onApproveApp, onRejectApp }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newApp, setNewApp] = useState({ name:"", pf:"", mobile:"", email:"" });
  const [tab, setTab] = useState(applications.length > 0 ? "online" : "manual");
  const [expandedApp, setExpandedApp] = useState(null);
  const [processing, setProcessing] = useState(null);
  const [editingIdx, setEditingIdx] = useState(null);
  const [editData, setEditData] = useState({});

  const toggle = (idx, field) => {
    const cur = DB.onboarding[idx][field];
    DB.onboarding[idx][field] = cur === "Y" ? "N" : "Y";
    const o = DB.onboarding[idx];
    if (o.formReceived === "Y" && o.pfVerified === "Y" && o.paymentReceived === "Y" && o.enteredInInputs === "Y") {
      const isImported = o.source === "monthly-import";
      const today = new Date().toISOString().slice(0,10);
      DB.members.push({
        msno: isImported && o.importedMSNO ? Number(o.importedMSNO) : DB.nextMSNO++,
        title: o.title || "Mr.", name: o.name, sowo: o.sowo || "", pf: o.pf, status:"ACTIVE",
        zone: o.zone || zones[0]?.zone || "", centre: o.centre || zones[0]?.zone || "",
        mobile: o.mobile, email: o.email,
        address: o.address || "", dob: o.dob || "",
        doj: o.doj || today, reasonForChange:"NEW_MEMBER", dateOfChange: today,
        category: o.category || "OFF", dor: o.dor || "",
        branchRetired: o.branchRetired || "", branchPension: o.branchPension || "",
        familyPensioner: o.familyPensioner || "", familyContact:"",
        bloodGroup: o.bloodGroup || "", applicationDate: o.dateReceived,
        admissionFeePaid: isImported ? "" : "Y", subscriptionYears: isImported ? 0 : 1,
        paymentMode:"", paymentRef:"",
        amountPaid: isImported ? 0 : config.admissionFee + config.annualSub,
        notes: isImported ? "Added via monthly import; NEW_MEMBER" : "NEW_MEMBER"
      });
      // Update nextMSNO if the imported MS.NO is higher
      if (isImported && o.importedMSNO && Number(o.importedMSNO) >= DB.nextMSNO) {
        DB.nextMSNO = Number(o.importedMSNO) + 1;
      }
      DB.onboarding.splice(idx, 1);
    }
    refresh();
  };

  const addApp = () => {
    if (!newApp.name || !newApp.pf) return;
    DB.onboarding.push({ appNo: DB.nextAppNo++, dateReceived: new Date().toISOString().slice(0,10), ...newApp, formReceived:"N", pfVerified:"N", paymentReceived:"N", enteredInInputs:"N" });
    setNewApp({ name:"", pf:"", mobile:"", email:"" });
    setShowAdd(false);
    refresh();
  };

  const removeApp = (idx) => {
    const o = DB.onboarding[idx];
    if (o) {
      // Use original imported dateOfChange if available, otherwise today
      const removalDate = o.importedDateOfChange || new Date().toISOString().slice(0, 10);
      const removalReason = o.importedReasonForChange || "REMOVED";
      const removalNotes = o.importedNotes || "Rejected from pending queue";
      // Check if this corresponds to an existing member (by importedMSNO or PF)
      const oPF = String(o.pf || "").trim();
      const oMSNO = o.importedMSNO ? Number(o.importedMSNO) : null;
      let existing = null;
      if (oMSNO) existing = DB.members.find(m => m.msno === oMSNO);
      if (!existing && oPF) existing = DB.members.find(m => String(m.pf || "").trim() === oPF);
      if (existing) {
        // Mark existing member as REMOVED
        existing.status = "REMOVED";
        existing.dateOfChange = removalDate;
        existing.reasonForChange = removalReason;
        existing.notes = (existing.notes ? existing.notes + "; " : "") + removalNotes;
      } else {
        // Create a new REMOVED member record for Form 7
        DB.members.push({
          msno: oMSNO || DB.nextMSNO++, title: o.title || "", name: o.name || "", sowo: o.sowo || "",
          pf: o.pf || "", category: o.category || "", centre: o.centre || "", zone: o.zone || "",
          address: o.address || "", mobile: o.mobile || "", familyContact: "",
          email: o.email || "", dob: o.dob || "", doj: o.doj || "",
          status: "REMOVED", dor: o.dor || "", branchRetired: o.branchRetired || "",
          branchPension: o.branchPension || "", familyPensioner: "",
          bloodGroup: o.bloodGroup || "", applicationDate: o.dateReceived || "",
          dateOfChange: removalDate,
          reasonForChange: removalReason, notes: removalNotes,
          admissionFeePaid: "N", paymentMode: "", paymentRef: "", amountPaid: 0,
        });
      }
    }
    DB.onboarding.splice(idx, 1);
    refresh();
  };

  const startEdit = (idx) => {
    const o = DB.onboarding[idx];
    setEditData({ name:o.name||"", title:o.title||"", sowo:o.sowo||"", pf:o.pf||"",
      mobile:o.mobile||"", email:o.email||"", category:o.category||"", centre:o.centre||"",
      zone:o.zone||"", address:o.address||"", doj:o.doj||"", dob:o.dob||"",
      dor:o.dor||"", branchRetired:o.branchRetired||"", branchPension:o.branchPension||"",
      bloodGroup:o.bloodGroup||"", importedMSNO:o.importedMSNO||"" });
    setEditingIdx(idx);
  };
  const saveEdit = () => {
    if (editingIdx === null) return;
    Object.entries(editData).forEach(([k, v]) => { DB.onboarding[editingIdx][k] = v; });
    refresh();
    setEditingIdx(null); setEditData({});
  };
  const cancelEdit = () => { setEditingIdx(null); setEditData({}); };
  const editField = (key, val) => setEditData(d => ({ ...d, [key]: val }));

  const editableFields = [
    { key:"title", label:"Title", half:true }, { key:"name", label:"Name" },
    { key:"sowo", label:"S/o W/o D/o" }, { key:"pf", label:"PF Number", half:true },
    { key:"importedMSNO", label:"MS.NO", half:true }, { key:"category", label:"Category", half:true },
    { key:"mobile", label:"Mobile", half:true }, { key:"email", label:"Email" },
    { key:"centre", label:"Centre", half:true }, { key:"zone", label:"Zone", half:true },
    { key:"address", label:"Address", full:true },
    { key:"doj", label:"DOJ (YYYY-MM-DD)", half:true }, { key:"dob", label:"DOB", half:true },
    { key:"dor", label:"Date of Retirement", half:true }, { key:"branchRetired", label:"Branch Retired From", half:true },
    { key:"branchPension", label:"Branch Pension Drawn", half:true }, { key:"bloodGroup", label:"Blood Group", half:true },
  ];

  const handleApprove = async (app) => {
    setProcessing(app.APP_ID);
    await onApproveApp(app);
    setProcessing(null); setExpandedApp(null);
  };
  const handleReject = async (app) => {
    setProcessing(app.APP_ID);
    await onRejectApp(app);
    setProcessing(null); setExpandedApp(null);
  };

  const ticks = ["formReceived","pfVerified","paymentReceived","enteredInInputs"];
  const tickLabels = { formReceived:"Form Received", pfVerified:"PF Verified", paymentReceived:"Payment Received", enteredInInputs:"Entered in INPUTS" };

  const appDetailFields = [
    ["Name", a => `${a.TITLE||""} ${a.NAME||""}`], ["S/o W/o D/o", a => a.S_W_D_O], ["PF No.", a => a.PF_NO],
    ["DOB", a => a.DOB], ["Blood Group", a => a.BLOOD_GROUP], ["Category", a => a.CATEGORY],
    ["Mobile", a => a.CONTACT_1], ["Alt. Contact", a => a.CONTACT_2], ["Email", a => a.EMAIL],
    ["Address", a => a.ADDRESS], ["Zone", a => a.ZONE], ["Centre", a => a.CENTRE],
    ["Date of Retirement", a => a.DATE_OF_RETIREMENT], ["Branch Retired From", a => a.BRANCH_RETIRED_FROM],
    ["Branch Pension Drawn", a => a.BRANCH_PENSION_DRAWN], ["Family Pensioner", a => a.FAMILY_PENSIONER],
    ["Family Contact", a => a.FAMILY_CONTACT], ["Payment Mode", a => a.PAYMENT_MODE],
    ["Amount", a => a.AMOUNT_PAID ? `Rs. ${a.AMOUNT_PAID}` : ""], ["Payment Ref", a => a.PAYMENT_REF],
    ["Notes", a => a.NOTES],

  return (

        </div>
        <div className="flex gap-2">
          <button onClick={() => nav("printform")} className="bg-white border border-blue-300 text-blue-900 px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-50 transition"><Printer size={16}/>Print Blank Form</button>

      <div className="flex gap-2">
        <button onClick={() => setTab("online")} className={`px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 ${tab==="online"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[["name","Applicant Name"],["pf","PF Number"],["mobile","Mobile"],["email","Email"]].map(([k,l]) => (
              <div key={k}><label className="text-xs font-medium text-gray-600">{l}</label>
              <input type="text" value={newApp[k]} onChange={e => setNewApp(p => ({...p,[k]:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"/></div>

            <button onClick={addApp} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition">Save</button>

      {tab === "online" && (
        applications.length === 0 ? (

            <p className="font-medium mb-1">No online applications yet</p>
