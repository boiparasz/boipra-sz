/* ═══════════════════════════════════════════════════════════════════════════
   PASSWORD GATE — simple shared password before app loads
   ═══════════════════════════════════════════════════════════════════════════ */
const APP_PASSWORD = "BOIPRA2026";
const AUTH_KEY = "boipra_auth";

function PasswordGate({ onUnlock }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState("");
  const [show, setShow] = useState(false);

  // Check if already authenticated this session
  useEffect(() => {
    if (sessionStorage.getItem(AUTH_KEY) === "1") onUnlock();
  }, []);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (pw.trim().toUpperCase() === APP_PASSWORD) {
      sessionStorage.setItem(AUTH_KEY, "1");
      onUnlock();
    } else {
      setError("Incorrect password. Please try again.");
      setPw("");
    }
  };

  return (
    <div className="min-h-screen bg-blue-900 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center">
        <div className="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-4">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2 className="text-xl font-bold text-blue-900 mb-1">BOIPRA - South Zone</h2>
        <p className="text-gray-500 text-sm mb-6">Enter the access password to continue</p>
        <form onSubmit={handleSubmit}>
          <div className="relative mb-4">
            <input type={show ? "text" : "password"} value={pw} onChange={e => setPw(e.target.value)} placeholder="Enter password"
              className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none text-center text-lg tracking-widest"
              autoFocus/>
            <button type="button" onClick={() => setShow(!show)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              {show ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                : <Eye size={18}/>}
            </button>
          </div>
          {error && <p className="text-red-500 text-sm mb-3">{error}</p>}
          <button type="submit" className="w-full bg-blue-900 text-white py-3 rounded-xl font-semibold hover:bg-blue-800 transition">
            Unlock App
          </button>
        </form>
        <p className="text-gray-400 text-xs mt-4">Contact your BOIPRA-SZ administrator for the password</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   INDEXED-DB PERSISTENCE — data survives browser close
   ═══════════════════════════════════════════════════════════════════════════ */
const IDB_NAME = "BOIPRA_SZ_DB";
const IDB_VER  = 1;
const IDB_STORE = "appData";

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSave(key, val) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbLoad(key) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbClear() {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   GOOGLE SHEETS SYNC — read/write via Apps Script Web App
   ═══════════════════════════════════════════════════════════════════════════ */
const SCRIPT_URL_KEY = "boipra_script_url";
const DEFAULT_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxjakhlEirKX-zkOJeqzjW8dsy1DOfI5Mo5INEET2p3tTFokP1lNTytri4-Y18O69JC/exec";

function getScriptUrl() { return localStorage.getItem(SCRIPT_URL_KEY) || DEFAULT_SCRIPT_URL; }
function setScriptUrl(url) { localStorage.setItem(SCRIPT_URL_KEY, url); }
function clearScriptUrl() { localStorage.removeItem(SCRIPT_URL_KEY); }

// Column mapping: app field keys <-> Google Sheet HEADERS
const APP_TO_SHEET = {
  msno:"M.S.NO", pf:"PF_NO", title:"TITLE", name:"NAME", sowo:"S_W_D_O",
  category:"CATEGORY", centre:"CENTRE", zone:"ZONE", address:"ADDRESS",
  mobile:"CONTACT_1", familyContact:"FAMILY_CONTACT", email:"EMAIL",
  dob:"DOB", doj:"DOJ", status:"STATUS", reasonForChange:"REASON_FOR_CHANGE",
  dateOfChange:"DATE_OF_CHANGE", dor:"DATE_OF_RETIREMENT",
  branchRetired:"BRANCH_RETIRED_FROM", branchPension:"BRANCH_PENSION_DRAWN",
  familyPensioner:"FAMILY_PENSIONER", bloodGroup:"BLOOD_GROUP",
  applicationDate:"APPLICATION_DATE", admissionFeePaid:"ADMISSION_FEE_PAID",
  subscriptionYears:"SUBSCRIPTION_YEARS", paymentMode:"PAYMENT_MODE",
  paymentRef:"PAYMENT_REF", amountPaid:"AMOUNT_PAID", notes:"NOTES",
};
const SHEET_TO_APP = {};
Object.entries(APP_TO_SHEET).forEach(([k,v]) => { SHEET_TO_APP[v] = k; });

function memberToSheetRow(m) {
  const row = {};
  Object.entries(APP_TO_SHEET).forEach(([appK, sheetH]) => { row[sheetH] = m[appK] ?? ""; });
  return row;
}

function sheetRowToMember(row) {
  const m = {
    msno:0, title:"Mr.", name:"", sowo:"", pf:"", status:"ACTIVE",
    zone:"", centre:"", mobile:"", email:"", address:"",
    dob:"", doj:"", reasonForChange:"", dateOfChange:"",
    category:"OFF", dor:"", branchRetired:"", branchPension:"",
    familyPensioner:"", familyContact:"", bloodGroup:"",
    applicationDate:"", admissionFeePaid:"Y", subscriptionYears:1,
    paymentMode:"", paymentRef:"", amountPaid:0, notes:"",
  };
  Object.entries(SHEET_TO_APP).forEach(([sheetH, appK]) => {
    if (row[sheetH] !== undefined && row[sheetH] !== null) m[appK] = row[sheetH];
  });
  m.msno = parseInt(m.msno) || 0;
  return m;
}

async function sheetGet(action) {
  const url = getScriptUrl();
  if (!url) throw new Error("No script URL configured");
  const resp = await fetch(url + "?action=" + action);
  if (!resp.ok) throw new Error("Network error: " + resp.status);
  return resp.json();
}

async function sheetPost(body) {
  const url = getScriptUrl();
  if (!url) throw new Error("No script URL configured");
  const resp = await fetch(url, {
    method: "POST", headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(body),
  });
  if (!resp.ok) throw new Error("Network error: " + resp.status);
  return resp.json();
}

async function sheetPing() {
  return sheetGet("ping");
}

async function sheetFetchMembers() {
  const res = await sheetGet("getMembers");
  if (!res.success) throw new Error(res.error || "Failed to fetch members");
  return (res.data || []).map(sheetRowToMember);
}

async function sheetSaveAllMembers(members) {
  const rows = members.map(memberToSheetRow);
  const res = await sheetPost({ action: "saveAllMembers", data: rows });
  if (!res.success) throw new Error(res.error || "Failed to save");
  return res;
}

async function sheetSaveMember(member) {
  const row = memberToSheetRow(member);
  const res = await sheetPost({ action: "saveMember", data: row });
  if (!res.success) throw new Error(res.error || "Failed to save member");
  return res;
}

async function sheetDeleteMember(msno) {
  const res = await sheetPost({ action: "deleteMember", msno: msno });
  if (!res.success) throw new Error(res.error || "Failed to delete");
  return res;
}

async function sheetInitSheet() {
  const res = await sheetPost({ action: "initSheet" });
  if (!res.success) throw new Error(res.error || "Failed to init sheet");
  return res;
}

// Application (public form) API functions
async function sheetFetchApplications() {
  const res = await sheetGet("getApplications");
  if (!res.success) throw new Error(res.error || "Failed to fetch applications");
  return res.data || [];
}

async function sheetDeleteApplication(appId) {
  const res = await sheetPost({ action: "deleteApplication", appId: appId });
  if (!res.success) throw new Error(res.error || "Failed to delete application");
  return res;
}

function excelDateToStr(v) {
  if (!v) return "";
  if (typeof v === "string") return v;
  if (typeof v === "number") {
    // Excel serial date -> JS Date
    const d = new Date((v - 25569) * 86400000);
    const yyyy = d.getUTCFullYear();
    const mm = String(d.getUTCMonth() + 1).padStart(2, "0");
    const dd = String(d.getUTCDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  return String(v);
}

function importExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array", cellDates: false });
        // Try INPUTS sheet first, then common names, then first sheet
        const sheetName = wb.SheetNames.find(n => n.toUpperCase() === "INPUTS")
          || wb.SheetNames.find(n => n.toUpperCase().includes("MASTER"))
          || wb.SheetNames.find(n => n.toUpperCase().includes("MEMBER"))
          || wb.SheetNames.find(n => n.toUpperCase() === "FORM 6")
          || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
        if (raw.length < 2) { reject("Sheet has no data rows"); return; }

        // Find header row — scan first 10 rows for known column names
        let headerIdx = -1;
        const knownHeaders = ["M.S.NO", "PF_NO", "PF NO", "P F NO", "NAME", "TITLE", "CENTRE", "FP NO", "ZONE", "CONTACT NO"];
        for (let i = 0; i < Math.min(raw.length, 10); i++) {
          const row = (raw[i] || []).map(c => String(c || "").trim().toUpperCase());
          const matches = row.filter(c => knownHeaders.includes(c));
          if (matches.length >= 2) { headerIdx = i; break; }
        }
        if (headerIdx === -1) { reject("Could not find column headers. Make sure the file has columns like M.S.NO, NAME, PF NO, etc."); return; }

        const headers = (raw[headerIdx] || []).map(c => String(c || "").trim());

        // Build column index map — try exact match, then uppercase, then with normalized spaces, then collapsed spaces
        const colMap = {};
        headers.forEach((h, idx) => {
          const hUp = h.toUpperCase();
          const hNorm = h.replace(/\s+/g, " ").trim();
          const hNormUp = hNorm.toUpperCase();
          const hCollapsed = h.replace(/\s+/g, "").trim(); // "P F NO" -> "PFNO"
          const hCollapsedUp = hCollapsed.toUpperCase();
          const key = IMPORT_MAP[h] || IMPORT_MAP[hUp] || IMPORT_MAP[hNorm] || IMPORT_MAP[hNormUp] || IMPORT_MAP[hCollapsed] || IMPORT_MAP[hCollapsedUp];
          if (key && key !== "_sno" && key !== "_age") colMap[idx] = key;
        });

        if (Object.keys(colMap).length < 2) { reject("Could not map enough columns. Found: " + headers.filter(Boolean).join(", ")); return; }

        const dateFields = ["dob", "doj", "dor", "dateOfChange", "applicationDate"];
        const members = [];
        let maxMSNO = 0;

        for (let r = headerIdx + 1; r < raw.length; r++) {
          const row = raw[r];
          if (!row || row.every(c => c === null || c === undefined || c === "")) continue;
          const member = {
            msno: 0, title: "Mr.", name: "", sowo: "", pf: "", status: "ACTIVE",
            zone: "", centre: "", mobile: "", email: "", address: "",
            dob: "", doj: "", reasonForChange: "", dateOfChange: "",
            category: "OFF", dor: "", branchRetired: "", branchPension: "",
            familyPensioner: "", familyContact: "", bloodGroup: "",
            applicationDate: "", admissionFeePaid: "Y", subscriptionYears: 1,
            paymentMode: "", paymentRef: "", amountPaid: 0, notes: "",
          };

          Object.entries(colMap).forEach(([colIdx, key]) => {
            let val = row[parseInt(colIdx)];
            if (val === null || val === undefined) val = "";
            if (dateFields.includes(key)) val = excelDateToStr(val);
            else val = typeof val === "number" ? val : String(val).trim();
            member[key] = val;
          });

          // Ensure msno is a number
          member.msno = parseInt(member.msno) || 0;
          if (member.msno > maxMSNO) maxMSNO = member.msno;

          // If zone is empty but centre exists, copy centre as zone
          if (!member.zone && member.centre) member.zone = member.centre.toUpperCase();
          // If centre is empty but zone exists, copy zone as centre
          if (!member.centre && member.zone) member.centre = member.zone;

          // Skip completely empty rows (no name and no pf)
          if (!member.name && !member.pf) continue;
          // Default status
          if (!member.status) member.status = "ACTIVE";
          members.push(member);
        }

        // Assign MSNOs to rows that don't have one
        members.forEach((m, i) => { if (!m.msno) m.msno = maxMSNO + i + 1; });

        resolve({ members, maxMSNO: Math.max(maxMSNO, ...members.map(m => m.msno)) });
      } catch (err) { reject(err.message || "Failed to parse Excel file"); }
    };
    reader.onerror = () => reject("Failed to read file");
    reader.readAsArrayBuffer(file);
  });
}

function exportToExcel(members, config) {
  const headers = ["M.S.NO","PF_NO","TITLE","NAME","CATEGORY","CENTRE","ZONE_RAW","ADDRESS","CONTACT_1","CONTACT_2","EMAIL","DOB_RAW","DOJ_RAW","STATUS_IN","DATE_OF_CHANGE","REMARKS","DATE_OF_RETIREMENT","BRANCH_RETIRED_FROM","BRANCH_PENSION_DRAWN","FAMILY_PENSIONER","FAMILY_CONTACT","BLOOD_GROUP","APPLICATION_DATE","ADMISSION_FEE_PAID","SUBSCRIPTION_YEARS","PAYMENT_MODE","PAYMENT_REF"];
  const keyMap = {};
  Object.entries(IMPORT_MAP).forEach(([excelH, appK]) => { keyMap[excelH] = appK; });

  const data = [headers];
  members.forEach(m => {
    data.push(headers.map(h => m[keyMap[h]] ?? ""));
  });

  const ws = XLSX.utils.aoa_to_sheet(data);
  // Set column widths
  ws["!cols"] = headers.map(h => ({ wch: Math.max(h.length + 2, 14) }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "INPUTS");
  XLSX.writeFile(wb, `BOIPRA-SZ_Members_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function getAge(dob) {
  if (!dob) return null;
  const d = new Date(dob), now = new Date();
  let a = now.getFullYear() - d.getFullYear();
  if (now.getMonth() < d.getMonth() || (now.getMonth() === d.getMonth() && now.getDate() < d.getDate())) a--;
  return a;
}

function getIssues(m, zones) {
  const issues = [];
  if (!m.pf) issues.push("MissingPF");
  if (!m.dob) issues.push("MissingDOB");
  if (!m.dor) issues.push("MissingDOR");
  if (!m.bloodGroup) issues.push("MissingBloodGroup");
  if (!m.mobile) issues.push("MissingMobile");
  if (!m.email) issues.push("MissingEmail");
  if (m.zone && !zones.find(z => z.zone === String(m.zone).toUpperCase())) issues.push("BadZone");
  return issues;
}

function getDupPFs(members) {
  const seen = {}, dups = new Set();
  members.filter(m => m.pf && m.status === "ACTIVE").forEach(m => {
    if (seen[m.pf]) dups.add(m.pf);
    seen[m.pf] = true;
  });
  return dups;
}

      setError(typeof err === "string" ? err : "Failed to import file. Make sure it's a valid .xlsx file.");

            return;
          } catch (e) {
            console.warn("Sheet load failed, trying local:", e);
            // If default URL is set, still show the app (offline mode)
            if (getScriptUrl() === DEFAULT_SCRIPT_URL) {
              setUseSheet(true);
              setHasData(true);
            }
          }
        }
        // Fall back to IndexedDB
        const saved = await idbLoad("appState");
        if (saved && saved.members && saved.members.length > 0) {
          DB.members = saved.members;
          DB.nextMSNO = saved.nextMSNO || (Math.max(...saved.members.map(m => m.msno)) + 1);
          DB.nextAppNo = saved.nextAppNo || 1;
          DB.config = saved.config || { ...CONFIG_DEFAULTS };
          DB.zones = saved.zones || ZONE_DEFAULTS.map(z => ({...z}));
          DB.onboarding = saved.onboarding || [];
          setMembers([...DB.members]);
          setConfig({...DB.config});
          setZones(DB.zones.map(z => ({...z})));
          setOnboarding([...DB.onboarding]);
          setHasData(true);
        }
      } catch (e) { console.warn("Load failed:", e); }
      setLoading(false);
    })();
  }, []);

  // Auto-refresh from Google Sheet every 60 seconds for multi-user sync
  useEffect(() => {
    if (!authenticated || !getScriptUrl()) return;
    const interval = setInterval(async () => {
      try {
        const sheetMembers = await sheetFetchMembers();
        DB.members = sheetMembers;
        DB.nextMSNO = sheetMembers.length > 0 ? Math.max(...sheetMembers.map(m => m.msno)) + 1 : 1001;
        setMembers([...DB.members]);
        try { const apps = await sheetFetchApplications(); setApplications(apps); } catch(e) {}
      } catch (e) { /* silent fail on background sync */ }
    }, 60000);
    return () => clearInterval(interval);
  }, [authenticated]);

  // Save: to Google Sheet (if connected) AND IndexedDB (always as backup)
  const persistToDB = useCallback(() => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        // Always save to IndexedDB as local backup
        await idbSave("appState", {
          members: DB.members, nextMSNO: DB.nextMSNO, nextAppNo: DB.nextAppNo,
          config: DB.config, zones: DB.zones, onboarding: DB.onboarding,
        });
        // If Google Sheet is connected, also sync there
        if (getScriptUrl()) {
          setSyncing(true); setSyncError("");
          try {
            await sheetSaveAllMembers(DB.members);
            setSaveStatus("synced");
          } catch (e) {
            setSyncError("Sync failed - saved locally");
            setSaveStatus("local");
          }
          setSyncing(false);
        } else {
          setSaveStatus("saved");
        }
        setTimeout(() => setSaveStatus(""), 3000);
      } catch (e) { console.warn("Save failed:", e); }
    }, 800);
  }, []);

  const refresh = () => {
    setMembers([...DB.members]);
    setOnboarding([...DB.onboarding]);
    setConfig({ ...DB.config });
    setZones(DB.zones.map(z => ({...z})));
    persistToDB();
  };

  const nav = (v, msno) => { setView(v); setSelectedMSNO(msno || null); };

  // Refresh from Google Sheet
  const refreshFromSheet = async () => {
    if (!getScriptUrl()) return;
    setSyncing(true); setSyncError("");
    try {
      const sheetMembers = await sheetFetchMembers();
      DB.members = sheetMembers;
      DB.nextMSNO = sheetMembers.length > 0 ? Math.max(...sheetMembers.map(m => m.msno)) + 1 : 1001;
      setMembers([...DB.members]);
      try { const apps = await sheetFetchApplications(); setApplications(apps); } catch(e) {}
      setSaveStatus("synced");
      setTimeout(() => setSaveStatus(""), 2000);
    } catch (e) {
      setSyncError("Could not refresh from sheet: " + e.message);
    }
    setSyncing(false);
  };

  // Handle Google Sheet connection from Welcome screen
  const handleConnectSheet = async (url, memberCount) => {
    setScriptUrl(url);
    setUseSheet(true);
    setSyncing(true);
    try {
      if (memberCount > 0) {
        const sheetMembers = await sheetFetchMembers();
        DB.members = sheetMembers;
        DB.nextMSNO = sheetMembers.length > 0 ? Math.max(...sheetMembers.map(m => m.msno)) + 1 : 1001;
      } else {
        await sheetInitSheet();
        DB = makeEmptyDB();
      }
      setMembers([...DB.members]);
      setHasData(true);
    } catch (e) { setSyncError("Connected but failed to load: " + e.message); }
    setSyncing(false);
  };

  // Handle Excel import from Welcome screen
  const handleImport = async (result) => {
    DB.members = result.members;
    DB.nextMSNO = result.maxMSNO + 1;
    setHasData(true);
    // If sheet is connected, push to sheet
    if (getScriptUrl()) {
      try { await sheetSaveAllMembers(DB.members); } catch(e) { console.warn("Sheet push failed:", e); }
    }
    refresh();
  };

  const handleStartFresh = () => {
    DB = makeEmptyDB();
    setHasData(true);
    if (getScriptUrl()) { sheetInitSheet().catch(()=>{}); }
    refresh();
  };

  // Handle import from Settings (merge or replace)
  const handleSettingsImport = async (file, mode) => {
    try {
      const result = await importExcel(file);
      if (mode === "replace") {
        DB.members = result.members;
        DB.nextMSNO = result.maxMSNO + 1;
      } else {
        const existingPFs = new Set(DB.members.map(m => m.pf));
        let added = 0;
        result.members.forEach(m => {
          if (!existingPFs.has(m.pf)) {
            m.msno = DB.nextMSNO++;
            DB.members.push(m);
            added++;
          }
        });
        refresh();
        return added;
      }
      refresh();
      return result.members.length;
    } catch (err) { throw err; }
  };

  const handleReset = async () => {
    await idbClear();
    clearScriptUrl();
    DB = makeEmptyDB();
    setMembers([]); setOnboarding([]);
    setConfig({...CONFIG_DEFAULTS});
    setZones(ZONE_DEFAULTS.map(z => ({...z})));
    setHasData(false); setUseSheet(false);
  };

  const issues = useMemo(() => {
    const dupPFs = getDupPFs(members);
    const all = [];
    members.filter(m => m.status === "ACTIVE").forEach(m => {
      const mi = getIssues(m, zones);
      if (dupPFs.has(m.pf)) mi.push("DuplicatePF");
      mi.forEach(issue => all.push({ msno: m.msno, name: m.name, pf: m.pf, issue }));
    });
    return all;
  }, [members, zones]);

  // Password gate
  if (!authenticated) {
    return <PasswordGate onUnlock={() => setAuthenticated(true)}/>;
  }

  if (loading) {
    return <div className="min-h-screen bg-blue-900 flex items-center justify-center"><div className="text-center"><RefreshCw size={32} className="text-white animate-spin mx-auto mb-4"/><p className="text-blue-300">Loading...</p></div></div>;
  }

  if (!hasData) {
    return <WelcomeScreen onConnectSheet={handleConnectSheet} onImport={handleImport} onStartFresh={handleStartFresh}/>;
  }

  const tabs = [
    { id:"dashboard", label:"Dashboard", icon:<BarChart3 size={16}/> },
    { id:"enroll", label:"New Member", icon:<UserPlus size={16}/> },
    { id:"onboarding", label:"Pending Queue", icon:<ClipboardList size={16}/> },
    { id:"members", label:"Members", icon:<Users size={16}/> },
    { id:"issues", label:"Issues", icon:<AlertTriangle size={16}/> },
    { id:"reports", label:"Reports", icon:<FileText size={16}/> },
    { id:"settings", label:"Settings", icon:<Settings size={16}/> },
  ];

  return (
    <div className="min-h-screen bg-gray-50">
      <header className="bg-blue-900 shadow-lg no-print">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <button onClick={() => nav("dashboard")} className="flex items-center gap-3 hover:opacity-90 transition">
            <div className="w-10 h-10 rounded-full bg-blue-700 flex items-center justify-center"><Users size={20} className="text-white"/></div>
            <div><h1 className="text-white font-bold text-lg leading-tight">BOIPRA - South Zone</h1>
            <p className="text-blue-300 text-xs">Membership Management System</p></div>
          </button>
          <div className="flex items-center gap-3 mobile-stack">
            <div className="flex items-center gap-2">
              {syncing && <RefreshCw size={14} className="text-blue-300 animate-spin"/>}
              {saveStatus === "synced" && <span className="text-green-400 text-xs flex items-center gap-1"><Check size={12}/><span className="mobile-hide">Synced to Sheet</span></span>}
              {saveStatus === "saved" && <span className="text-green-400 text-xs flex items-center gap-1"><Check size={12}/><span className="mobile-hide">Saved locally</span></span>}
              {saveStatus === "local" && <span className="text-amber-400 text-xs flex items-center gap-1"><AlertCircle size={12}/><span className="mobile-hide">Offline</span></span>}
              {syncError && <span className="text-red-400 text-xs mobile-hide">{syncError}</span>}
              {getScriptUrl() && <button onClick={refreshFromSheet} title="Refresh from Google Sheet" className="text-blue-300 hover:text-white transition p-1"><RefreshCw size={14}/></button>}
              <button onClick={() => { sessionStorage.removeItem(AUTH_KEY); window.location.reload(); }} title="Logout" className="text-blue-300 hover:text-white transition p-1"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
            </div>
            <nav className="flex gap-1 overflow-x-auto mobile-nav">
              {tabs.map(t => (
                <button key={t.id} onClick={() => nav(t.id)}
                  className={`px-3 py-2 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all whitespace-nowrap ${
                    view === t.id || (view === "member-detail" && t.id === "members") ? "bg-white text-blue-900" : "text-blue-200 hover:bg-blue-800"
                  }`}>
                  {t.icon}<span className="mobile-hide">{t.label}</span>
                  {t.id === "issues" && issues.length > 0 && (
                    <span className="badge bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{issues.length}</span>
                  )}
                  {t.id === "onboarding" && onboarding.length > 0 && (
                    <span className="badge bg-amber-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{onboarding.length}</span>
                  )}
                </button>
              ))}
            </nav>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6">
        {view === "dashboard" && <Dashboard members={members} issues={issues} onboarding={onboarding} nav={nav} config={config} onExport={() => exportToExcel(DB.members, DB.config)} refreshFromSheet={refreshFromSheet} useSheet={useSheet}/>}
        {view === "enroll" && <EnrollWizard zones={zones} config={config} onDone={() => { refresh(); nav("members"); }}/>}
        {view === "onboarding" && <OnboardingQueue onboarding={onboarding} applications={applications} refresh={refresh} nav={nav} zones={zones} config={config} onApproveApp={async (app) => {
          // Convert application to member and add
          const newMember = {
            msno: DB.nextMSNO, title: app.TITLE || "", name: app.NAME || "", sowo: app.S_W_D_O || "",
            pf: app.PF_NO || "", category: app.CATEGORY || "", centre: app.CENTRE || "", zone: app.ZONE || "",
            address: app.ADDRESS || "", mobile: app.CONTACT_1 || "", familyContact: app.FAMILY_CONTACT || "",
            email: app.EMAIL || "", dob: app.DOB || "", doj: new Date().toISOString().slice(0,10),
            status: "ACTIVE", dor: app.DATE_OF_RETIREMENT || "", branchRetired: app.BRANCH_RETIRED_FROM || "",
            branchPension: app.BRANCH_PENSION_DRAWN || "", familyPensioner: app.FAMILY_PENSIONER || "",
            bloodGroup: app.BLOOD_GROUP || "", applicationDate: app.SUBMITTED_AT ? app.SUBMITTED_AT.slice(0,10) : "",
            admissionFeePaid: app.AMOUNT_PAID ? "Y" : "N", paymentMode: app.PAYMENT_MODE || "",
            paymentRef: app.PAYMENT_REF || "", amountPaid: app.AMOUNT_PAID || "", notes: app.NOTES || "",
          };
          DB.members.push(newMember); DB.nextMSNO++;
          try { await sheetSaveAllMembers(DB.members.map(m => memberToSheetRow(m))); } catch(e) { console.warn("Sheet save failed:", e); }
          try { await sheetDeleteApplication(app.APP_ID); } catch(e) {}
          setApplications(prev => prev.filter(a => a.APP_ID !== app.APP_ID));
          refresh();
        }} onRejectApp={async (app) => {
          try { await sheetDeleteApplication(app.APP_ID); } catch(e) {}
          setApplications(prev => prev.filter(a => a.APP_ID !== app.APP_ID));
        }}/>}
        {view === "members" && <MemberList members={members} nav={nav} refresh={refresh} zones={zones}/>}
        {view === "member-detail" && <MemberDetail msno={selectedMSNO} zones={zones} refresh={refresh} nav={nav}/>}
        {view === "issues" && <IssuesView issues={issues} nav={nav}/>}
        {view === "reports" && <Reports members={members} config={config}/>}
        {view === "settings" && <SettingsView config={config} zones={zones} refresh={refresh} members={members} onImport={handleSettingsImport} onReset={handleReset} onExport={() => exportToExcel(DB.members, DB.config)} useSheet={useSheet} onPushToSheet={async () => { setSyncing(true); try { await sheetSaveAllMembers(DB.members); setSaveStatus("synced"); } catch(e) { setSyncError(e.message); } setSyncing(false); setTimeout(() => setSaveStatus(""), 3000); }} onRefreshFromSheet={refreshFromSheet}/>}
      </main>

      <footer className="no-print text-center py-3 text-xs text-gray-400 border-t bg-white mobile-small">
        {members.length} members {getScriptUrl() ? <>synced to Google Sheet &middot; <span className="text-green-600">Multi-user mode</span></> : "stored locally in this browser"} <span className="mobile-hide">&middot; Last saved: {new Date().toLocaleTimeString()}</span>
      </footer>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   DASHBOARD (SUMMARY tab)
   ═══════════════════════════════════════════════════════════════════════════ */
function Dashboard({ members, issues, onboarding, nav, config, onExport, refreshFromSheet, useSheet }) {
  const active = members.filter(m => m.status === "ACTIVE").length;
  const removed = members.filter(m => m.status === "REMOVED").length;
  const deceased = members.filter(m => m.status === "DECEASED").length;
  const expired = members.filter(m => m.status === "EXPIRED").length;
  const total = members.length;

  const centres = {};
  let ageSum = 0, ageN = 0;
  members.filter(m => m.status === "ACTIVE").forEach(m => {
    centres[m.centre] = (centres[m.centre] || 0) + 1;
    const a = getAge(m.dob); if (a) { ageSum += a; ageN++; }
  });
  const topCentres = Object.entries(centres).sort((a,b) => b[1] - a[1]);
  const maxC = topCentres.length ? topCentres[0][1] : 1;
  const totalActive = active || 1;
  const avgAge = ageN ? Math.round(ageSum / ageN) : "\u2014";

  // Membership dues calculation
  const now = new Date();
  const duesInfo = useMemo(() => {
    let paidUp = 0, dueForRenewal = 0, noInfo = 0;
    members.filter(m => m.status === "ACTIVE").forEach(m => {
      if (!m.doj || !m.subscriptionYears) { noInfo++; return; }
      const doj = new Date(m.doj);
      if (isNaN(doj.getTime())) { noInfo++; return; }
      const coveredUntil = new Date(doj);
      coveredUntil.setFullYear(coveredUntil.getFullYear() + Number(m.subscriptionYears));
      if (coveredUntil > now) paidUp++;
      else dueForRenewal++;
    });
    return { paidUp, dueForRenewal, noInfo };
  }, [members]);
  const duesTotal = duesInfo.paidUp + duesInfo.dueForRenewal + duesInfo.noInfo || 1;

  // Upcoming birthdays
  const birthdays = useMemo(() => {
    const currentMonth = now.getMonth();
    const nextMonth = (currentMonth + 1) % 12;
    const today = now.getDate();
    return members.filter(m => m.status === "ACTIVE" && m.dob).map(m => {
      const d = new Date(m.dob);
      if (isNaN(d.getTime())) return null;
      const bMonth = d.getMonth();
      if (bMonth !== currentMonth && bMonth !== nextMonth) return null;
      const bDay = d.getDate();
      const age = now.getFullYear() - d.getFullYear();
      const isToday = bMonth === currentMonth && bDay === today;
      const sortKey = bMonth === currentMonth ? bDay : 32 + bDay;
      return { msno: m.msno, name: m.name, date: `${bDay}/${bMonth+1}`, turnsAge: age, isToday, sortKey, bMonth };
    }).filter(Boolean).sort((a,b) => a.sortKey - b.sortKey);
  }, [members]);

  // Recent activity (last 90 days)
  const recentActivity = useMemo(() => {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 90);
    const items = [];
    members.forEach(m => {
      if (m.doj) {
        const d = new Date(m.doj);
        if (!isNaN(d.getTime()) && d >= cutoff) items.push({ msno: m.msno, name: m.name, action: "Joined", date: m.doj, sort: d });
      }
      if (m.dateOfChange && (m.status === "REMOVED" || m.status === "DECEASED")) {
        const d = new Date(m.dateOfChange);
        if (!isNaN(d.getTime()) && d >= cutoff) items.push({ msno: m.msno, name: m.name, action: m.status === "DECEASED" ? "Deceased" : "Removed", date: m.dateOfChange, sort: d });
      }
    });
    return items.sort((a,b) => b.sort - a.sort).slice(0, 6);
  }, [members]);

  const barColors = ["bg-blue-500","bg-indigo-500","bg-teal-500","bg-cyan-500","bg-violet-500","bg-sky-500","bg-blue-400","bg-indigo-400","bg-teal-400","bg-cyan-400"];

  const cards = [
    { label:"Total Members", value:total, border:"border-l-blue-600", click:() => nav("members") },
    { label:"Active", value:active, border:"border-l-green-600", click:() => nav("members") },
    { label:"Removed / Deceased", value:removed + deceased, border:"border-l-red-500", click:() => nav("members") },
    { label:"Pending Applications", value:onboarding.length, border:"border-l-amber-500", click:() => nav("onboarding") },
    { label:"Data Issues", value:issues.length, border: issues.length ? "border-l-red-600" : "border-l-green-600", click:() => nav("issues") },
    { label:"Avg Age", value:avgAge, border:"border-l-purple-600" },
  ];

  return (
    <div className="space-y-6">
      {/* Row 1: Hero stat cards */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        {cards.map(c => (
          <button key={c.label} onClick={c.click} className={`bg-white rounded-xl shadow-sm border border-gray-100 border-l-4 ${c.border} p-4 text-left hover:shadow-md transition ${c.click ? "cursor-pointer" : "cursor-default"}`}>
            <div className="text-2xl font-bold text-gray-900">{c.value}</div>
            <div className="text-xs text-gray-500 leading-tight mt-1">{c.label}</div>
          </button>
        ))}
      </div>

      {/* Row 2: Dues Overview + Upcoming Birthdays */}
      <div className="grid md:grid-cols-2 gap-4">
        {/* Membership Dues Overview */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-semibold text-gray-900 mb-4 text-sm flex items-center gap-2"><ClipboardList size={16} className="text-blue-600"/>Membership Dues Overview</h3>
          <div className="space-y-3">
            <div>
              <div className="flex justify-between text-xs mb-1"><span className="text-green-700 font-medium">Paid Up</span><span className="font-bold">{duesInfo.paidUp}</span></div>
              <div className="w-full bg-gray-100 rounded-full h-3 overflow-hidden"><div className="bg-green-500 h-full rounded-full transition-all" style={{width:`${(duesInfo.paidUp/duesTotal)*100}%`}}/></div>
            </div>
            <div>
              <div className="flex justify-between text-xs mb-1"><span className="text-amber-700 font-medium">Due for Renewal</span><span className="font-bold">{duesInfo.dueForRenewal}</span></div>
              <div className="w-full bg-gray-100 rounded-full h-3 overflow-hidden"><div className="bg-amber-500 h-full rounded-full transition-all" style={{width:`${(duesInfo.dueForRenewal/duesTotal)*100}%`}}/></div>
            </div>
            <div>
              <div className="flex justify-between text-xs mb-1"><span className="text-gray-500 font-medium">No Payment Info</span><span className="font-bold">{duesInfo.noInfo}</span></div>
              <div className="w-full bg-gray-100 rounded-full h-3 overflow-hidden"><div className="bg-gray-400 h-full rounded-full transition-all" style={{width:`${(duesInfo.noInfo/duesTotal)*100}%`}}/></div>
            </div>
          </div>
          <button onClick={() => nav("members")} className="text-xs text-blue-700 hover:underline mt-3 flex items-center gap-1">View Details <ChevronRight size={12}/></button>
        </div>

        {/* Upcoming Birthdays */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-semibold text-gray-900 mb-4 text-sm flex items-center gap-2"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-pink-500"><path d="M20 21v-2a4 4 0 0 0-3-3.87"/><path d="M4 21v-2a4 4 0 0 1 3-3.87"/><circle cx="12" cy="7" r="4"/></svg>Upcoming Birthdays</h3>
          {birthdays.length === 0 ? <p className="text-gray-400 text-sm">No birthdays this month or next.</p> : (
            <div className="space-y-2">
              {birthdays.slice(0, 8).map((b, i) => (
                <div key={i} className={`flex items-center justify-between py-1.5 px-2 rounded-lg text-sm ${b.isToday ? "bg-pink-50 border border-pink-200" : ""}`}>
                  <button onClick={() => nav("member-detail", b.msno)} className="text-blue-700 hover:underline font-medium truncate max-w-[55%]">{b.name}</button>
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-gray-500">{b.date}</span>
                    <span className="text-xs font-semibold text-purple-700">turns {b.turnsAge}</span>
                    {b.isToday && <span className="text-xs bg-pink-500 text-white px-1.5 py-0.5 rounded-full font-bold">TODAY</span>}
                  </div>
                </div>
              ))}
              {birthdays.length > 8 && <p className="text-xs text-gray-400 mt-1">and {birthdays.length - 8} more...</p>}
            </div>
          )}
        </div>
      </div>

      {/* Row 3: Members by Centre + Recent Activity */}
      <div className="grid md:grid-cols-2 gap-4">
        {/* Members by Centre */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-semibold text-gray-900 mb-3 text-sm flex items-center gap-2"><BarChart3 size={16} className="text-indigo-600"/>Active Members by Centre</h3>
          {topCentres.length === 0 ? <p className="text-gray-400 text-sm">No active members yet.</p> : (
            <div className="space-y-2">
              {topCentres.map(([c, n], idx) => (
                <div key={c} className="flex items-center gap-3">
                  <span className="text-xs text-gray-600 w-24 truncate font-medium">{c}</span>
                  <div className="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
                    <div className={`${barColors[idx % barColors.length]} h-full rounded-full flex items-center justify-end pr-2 transition-all`} style={{width:`${Math.max((n/maxC)*100,15)}%`}}>
                      <span className="text-xs font-bold text-white">{n}</span>
                    </div>
                  </div>
                  <span className="text-xs text-gray-400 w-10 text-right">{Math.round((n/totalActive)*100)}%</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Recent Activity */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-semibold text-gray-900 mb-3 text-sm flex items-center gap-2"><Clock size={16} className="text-amber-600"/>Recent Activity <span className="text-xs text-gray-400 font-normal">(last 90 days)</span></h3>
          {recentActivity.length === 0 ? <p className="text-gray-400 text-sm">No recent activity.</p> : (
            <div className="space-y-2">

/* ═══════════════════════════════════════════════════════════════════════════
   ENROLLMENT WIZARD
   ═══════════════════════════════════════════════════════════════════════════ */
function FieldInput({ field, value, onChange, error, zones }) {
  const meta = INPUT_FIELDS.find(f => f.key === field);
  if (!meta) return null;
  const cls = `w-full border rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition ${error ? "border-red-400 bg-red-50" : "border-gray-300"}`;

  if (meta.type === "select" || meta.type === "zone") {
    const opts = meta.type === "zone" ? zones.map(z => z.zone) : meta.options;
    return (
      <select value={value || ""} onChange={e => onChange(e.target.value)} className={cls + " bg-white"}>
        {(!meta.required || !value) && <option value="">— Select —</option>}
        {opts.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }
  if (meta.type === "textarea") return <textarea value={value || ""} onChange={e => onChange(e.target.value)} rows={2} className={cls + " resize-none"} placeholder={meta.placeholder || ""}/>;
  return <input type={meta.type === "tel" ? "tel" : meta.type === "number" ? "number" : meta.type === "date" ? "date" : "text"} value={value || ""} onChange={e => onChange(e.target.value)} className={cls} placeholder={meta.placeholder || ""}/>;
}

function EnrollWizard({ zones, config, onDone }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({ title:"Mr.", status:"ACTIVE", category:"OFF", admissionFeePaid:"Y", subscriptionYears:1, amountPaid:config.admissionFee + config.annualSub, zone:zones[0]?.zone || "", centre:zones[0]?.zone || "" });
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const set = (k, v) => { setForm(f => ({...f, [k]:v})); setErrors(e => { const n={...e}; delete n[k]; return n; }); };

  const validate = () => {
    const errs = {};
    ENROLL_STEPS[step].fields.forEach(f => {
      const meta = INPUT_FIELDS.find(x => x.key === f);
      if (meta?.required && !form[f]?.toString().trim()) errs[f] = `${meta.label} is required`;
      if (f === "mobile" && form[f] && !/^\d{10}$/.test(form[f])) errs[f] = "Enter 10-digit number";
      if (f === "email" && form[f] && !form[f].includes("@")) errs[f] = "Invalid email";
      if (f === "pf" && form[f] && DB.members.some(m => m.pf === form[f] && m.status === "ACTIVE")) errs[f] = "Duplicate PF!";
    });
    setErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const next = () => { if (step < 4 && validate()) setStep(s => s+1); };
  const prev = () => { if (step > 0) setStep(s => s-1); };

  const submit = () => {
    const member = { ...form, msno: DB.nextMSNO++, applicationDate: new Date().toISOString().slice(0,10), doj: new Date().toISOString().slice(0,10), subscriptionYears: parseInt(form.subscriptionYears), amountPaid: parseInt(form.amountPaid) };
    DB.members.push(member);
    setSubmitted(true);
  };

  if (submitted) {
    const m = DB.members[DB.members.length - 1];
    return (
      <div className="max-w-lg mx-auto bg-white rounded-2xl shadow-lg border p-8 text-center space-y-4">
        <div className="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto"><Check size={40} className="text-green-600"/></div>
        <h2 className="text-2xl font-bold text-gray-900">Member Enrolled!</h2>
        <p className="text-gray-600"><strong>{m.name}</strong> — <span className="font-mono bg-blue-100 text-blue-900 px-2 py-0.5 rounded">M.S.NO {m.msno}</span></p>
        <button onClick={onDone} className="bg-blue-900 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-800 transition">View All Members</button>
      </div>
    );
  }

  return (
    <div className="max-w-2xl mx-auto">
      <div className="flex items-center mb-6">
        {ENROLL_STEPS.map((s,i) => (
          <div key={i} className="flex items-center flex-shrink-0">
            <button onClick={() => i < step && setStep(i)} className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition ${i < step ? "bg-green-500 text-white" : i === step ? "bg-blue-900 text-white ring-4 ring-blue-200" : "bg-gray-200 text-gray-500"}`}>
              {i < step ? <Check size={14}/> : i+1}
            </button>
            <span className={`ml-1 text-xs font-medium hidden lg:block ${i === step ? "text-blue-900" : "text-gray-400"}`}>{s.label}</span>
            {i < ENROLL_STEPS.length - 1 && <div className={`w-6 h-0.5 mx-1 ${i < step ? "bg-green-400" : "bg-gray-200"}`}/>}
          </div>
        ))}
      </div>

      <div className="bg-white rounded-2xl shadow-lg border overflow-hidden">
        <div className="bg-blue-900 px-6 py-4 flex items-center gap-3">
          <span className="text-2xl">{ENROLL_STEPS[step].icon}</span>
          <div><h2 className="text-white font-bold text-lg">{ENROLL_STEPS[step].label}</h2><p className="text-blue-300 text-xs">Step {step+1} of {ENROLL_STEPS.length}</p></div>
        </div>

        <div className="p-6 space-y-4">
          {step < 4 ? ENROLL_STEPS[step].fields.map(f => {
            const meta = INPUT_FIELDS.find(x => x.key === f);
            return (
              <div key={f}>
                <label className="block text-sm font-semibold text-gray-700 mb-1">{meta.label}{meta.required && <span className="text-red-500 ml-1">*</span>}</label>
                <FieldInput field={f} value={form[f]} onChange={v => set(f,v)} error={errors[f]} zones={zones}/>
                {errors[f] && <p className="text-red-500 text-xs mt-1 flex items-center gap-1"><AlertCircle size={12}/>{errors[f]}</p>}
              </div>
            );
          }) : (
            <div className="space-y-3">
              <p className="text-sm text-gray-500">Review all details before submitting.</p>
              {ENROLL_STEPS.slice(0,4).map((s,si) => (
                <div key={si} className="border rounded-lg overflow-hidden">
                  <button onClick={() => setStep(si)} className="w-full bg-gray-50 px-4 py-2 flex items-center justify-between text-left hover:bg-blue-50 transition">
                    <span className="font-semibold text-sm text-gray-800">{s.icon} {s.label}</span>
                    <span className="text-xs text-blue-600">Edit</span>
                  </button>
                  <div className="px-4 py-3 grid grid-cols-2 gap-x-6 gap-y-2">
                    {s.fields.map(f => {
                      const meta = INPUT_FIELDS.find(x => x.key === f);
                      return (<div key={f}><span className="text-xs text-gray-400">{meta?.label}</span><div className="text-sm font-medium text-gray-900">{form[f] || "\u2014"}</div></div>);
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="px-6 py-4 bg-gray-50 border-t flex justify-between">
          <button onClick={prev} disabled={step===0} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold transition ${step===0 ? "text-gray-300" : "text-gray-700 hover:bg-gray-200"}`}><ChevronLeft size={16}/>Back</button>
          {step < 4 ? (
            <button onClick={next} className="bg-blue-900 text-white px-6 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-800 transition"><span>Next</span><ChevronRight size={16}/></button>
          ) : (
            <button onClick={submit} className="bg-green-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-green-700 transition"><Check size={16}/>Submit & Register</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   ONBOARDING QUEUE
   ═══════════════════════════════════════════════════════════════════════════ */
function OnboardingQueue({ onboarding, applications = [], refresh, nav, zones, config, onApproveApp, onRejectApp }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newApp, setNewApp] = useState({ name:"", pf:"", mobile:"", email:"" });
  const [tab, setTab] = useState(applications.length > 0 ? "online" : "manual");
  const [expandedApp, setExpandedApp] = useState(null);
  const [processing, setProcessing] = useState(null);

  const toggle = (idx, field) => {
    const cur = DB.onboarding[idx][field];
    DB.onboarding[idx][field] = cur === "Y" ? "N" : "Y";
    const o = DB.onboarding[idx];
    if (o.formReceived === "Y" && o.pfVerified === "Y" && o.paymentReceived === "Y" && o.enteredInInputs === "Y") {
      DB.members.push({
        msno: DB.nextMSNO++, title:"Mr.", name: o.name, sowo:"", pf: o.pf, status:"ACTIVE",
        zone: zones[0]?.zone || "", centre: zones[0]?.zone || "", mobile: o.mobile, email: o.email,
        address:"", dob:"", doj: new Date().toISOString().slice(0,10), reasonForChange:"", dateOfChange:"",
        category:"OFF", dor:"", branchRetired:"", branchPension:"", familyPensioner:"", familyContact:"",
        bloodGroup:"", applicationDate: o.dateReceived, admissionFeePaid:"Y", subscriptionYears:1,
        paymentMode:"", paymentRef:"", amountPaid: config.admissionFee + config.annualSub, notes:"Added via onboarding queue"
      });
      DB.onboarding.splice(idx, 1);
    }
    refresh();
  };

  const addApp = () => {
    if (!newApp.name || !newApp.pf) return;
    DB.onboarding.push({ appNo: DB.nextAppNo++, dateReceived: new Date().toISOString().slice(0,10), ...newApp, formReceived:"N", pfVerified:"N", paymentReceived:"N", enteredInInputs:"N" });
    setNewApp({ name:"", pf:"", mobile:"", email:"" });
    setShowAdd(false);
    refresh();
  };

  const removeApp = (idx) => { DB.onboarding.splice(idx, 1); refresh(); };

  const handleApprove = async (app) => {
    setProcessing(app.APP_ID);
    await onApproveApp(app);
    setProcessing(null); setExpandedApp(null);
  };
  const handleReject = async (app) => {
    setProcessing(app.APP_ID);
    await onRejectApp(app);
    setProcessing(null); setExpandedApp(null);
  };

  const ticks = ["formReceived","pfVerified","paymentReceived","enteredInInputs"];
  const tickLabels = { formReceived:"Form Received", pfVerified:"PF Verified", paymentReceived:"Payment Received", enteredInInputs:"Entered in INPUTS" };

  const appDetailFields = [
    ["Name", a => `${a.TITLE||""} ${a.NAME||""}`], ["S/o W/o D/o", a => a.S_W_D_O], ["PF No.", a => a.PF_NO],
    ["DOB", a => a.DOB], ["Blood Group", a => a.BLOOD_GROUP], ["Category", a => a.CATEGORY],
    ["Mobile", a => a.CONTACT_1], ["Alt. Contact", a => a.CONTACT_2], ["Email", a => a.EMAIL],
    ["Address", a => a.ADDRESS], ["Zone", a => a.ZONE], ["Centre", a => a.CENTRE],
    ["Date of Retirement", a => a.DATE_OF_RETIREMENT], ["Branch Retired From", a => a.BRANCH_RETIRED_FROM],
    ["Branch Pension Drawn", a => a.BRANCH_PENSION_DRAWN], ["Family Pensioner", a => a.FAMILY_PENSIONER],
    ["Family Contact", a => a.FAMILY_CONTACT], ["Payment Mode", a => a.PAYMENT_MODE],
    ["Amount", a => a.AMOUNT_PAID ? `Rs. ${a.AMOUNT_PAID}` : ""], ["Payment Ref", a => a.PAYMENT_REF],
    ["Notes", a => a.NOTES],
  ];

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-lg font-bold text-gray-900">Pending Applications</h2>
          <p className="text-sm text-gray-500">Review online applications and manage manual entries.</p>
        </div>
        <button onClick={() => setShowAdd(!showAdd)} className="bg-blue-900 text-white px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-800 transition"><Plus size={16}/>Log Manual</button>
      </div>

      {/* Tabs for Online vs Manual */}
      <div className="flex gap-2">
        <button onClick={() => setTab("online")} className={`px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 ${tab==="online"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Online Applications {applications.length > 0 && <span className="bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{applications.length}</span>}
        </button>
        <button onClick={() => setTab("manual")} className={`px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 ${tab==="manual"?"bg-blue-900 text-white":"bg-white border text-gray-700 hover:bg-gray-50"}`}>
          <ClipboardList size={14}/>
          Manual Queue {onboarding.length > 0 && <span className="bg-amber-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{onboarding.length}</span>}
        </button>
      </div>

      {showAdd && (
        <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 space-y-3">
          <h3 className="font-semibold text-blue-900 text-sm">Log New Application (Manual)</h3>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[["name","Applicant Name"],["pf","PF Number"],["mobile","Mobile"],["email","Email"]].map(([k,l]) => (
              <div key={k}><label className="text-xs font-medium text-gray-600">{l}</label>
              <input type="text" value={newApp[k]} onChange={e => setNewApp(p => ({...p,[k]:e.target.value}))} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mt-1"/></div>
            ))}
          </div>
          <div className="flex gap-2">
            <button onClick={addApp} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition">Save</button>
            <button onClick={() => setShowAdd(false)} className="text-gray-500 px-4 py-2 rounded-lg text-sm hover:bg-gray-100 transition">Cancel</button>

      {tab === "manual" && (
        onboarding.length === 0 ? (
          <div className="bg-white rounded-xl shadow-sm border p-12 text-center text-gray-400"><ClipboardList size={40} className="mx-auto mb-3 text-gray-300"/>No manual applications. Use "Log Manual" to add one, or share the online join form.</div>
        ) : (
          <div className="space-y-3">
            {onboarding.map((o, idx) => {
              const done = ticks.filter(t => o[t] === "Y").length;
              return (
                <div key={idx} className="bg-white rounded-xl shadow-sm border p-4">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-800 font-bold text-sm">{o.name?.charAt(0)}</div>
                      <div>
                        <div className="font-semibold text-gray-900">{o.name} <span className="text-gray-400 font-normal text-xs">#{o.appNo}</span></div>
                        <div className="text-xs text-gray-500">PF: {o.pf} · {o.mobile} · Received: {o.dateReceived}</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-3">
                      <div className="text-xs font-medium text-gray-500">{done}/4</div>
                      <div className="w-20 bg-gray-200 rounded-full h-2"><div className={`h-2 rounded-full transition-all ${done === 4 ? "bg-green-500" : "bg-blue-500"}`} style={{width:`${(done/4)*100}%`}}/></div>
                      <button onClick={() => removeApp(idx)} className="text-gray-300 hover:text-red-500 transition"><Trash2 size={16}/></button>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                    {ticks.map(t => (
                      <button key={t} onClick={() => toggle(idx, t)}
                        className={`flex items-center gap-2 px-3 py-2 rounded-lg border text-sm font-medium transition ${
                          o[t] === "Y" ? "bg-green-50 border-green-300 text-green-800" : "bg-gray-50 border-gray-200 text-gray-500 hover:bg-blue-50 hover:border-blue-300"
                        }`}>
                        {o[t] === "Y" ? <CheckCircle size={16} className="text-green-600"/> : <div className="w-4 h-4 rounded-full border-2 border-gray-300"/>}
                        {tickLabels[t]}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   MEMBER LIST (INPUTS tab)
   ═══════════════════════════════════════════════════════════════════════════ */
function MemberList({ members, nav, refresh, zones }) {
  const [search, setSearch] = useState("");
  const [centreF, setCentreF] = useState("ALL");
  const [statusF, setStatusF] = useState("ALL");
  const [page, setPage] = useState(1);
  const PER_PAGE = 50;

  useEffect(() => { setPage(1); }, [search, centreF, statusF]);

  const allCentres = [...new Set(members.map(m => m.centre).filter(Boolean))].sort();
  const filtered = members.filter(m => {
    const q = search.toLowerCase();
    const ms = !q || String(m.name||"").toLowerCase().includes(q) || String(m.pf||"").toLowerCase().includes(q) || String(m.msno||"").includes(q) || String(m.mobile||"").includes(q) || String(m.centre||"").toLowerCase().includes(q) || String(m.email||"").toLowerCase().includes(q);
    return ms && (centreF === "ALL" || m.centre === centreF) && (statusF === "ALL" || m.status === statusF);
  });
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const paged = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  const exportCSV = () => {
    const h = INPUT_FIELDS.map(f => f.label);
    const rows = filtered.map(m => INPUT_FIELDS.map(f => m[f.key] ?? ""));
    const csv = [h,...rows].map(r => r.map(c => `"${c}"`).join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv"}); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "BOIPRA-SZ_Members.csv"; a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <div className="flex-1 flex gap-2 w-full sm:w-auto flex-wrap mobile-stack mobile-full">
          <div className="relative flex-1 min-w-48 mobile-full">
            <Search size={16} className="absolute left-3 top-3 text-gray-400"/>
            <input type="text" placeholder="Search name, PF, M.S.NO, mobile…" value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
          </div>
          <select value={centreF} onChange={e => setCentreF(e.target.value)} className="border rounded-lg px-3 py-2.5 text-sm bg-white">
            <option value="ALL">All Centres</option>{allCentres.map(c => <option key={c}>{c}</option>)}
          </select>
          <select value={statusF} onChange={e => setStatusF(e.target.value)} className="border rounded-lg px-3 py-2.5 text-sm bg-white">
            <option value="ALL">All Status</option>{STATUSES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div className="flex gap-2">
          <button onClick={exportCSV} className="flex items-center gap-2 text-sm font-medium text-blue-900 bg-blue-100 hover:bg-blue-200 px-4 py-2.5 rounded-lg transition"><Download size={14}/>CSV</button>
          <button onClick={() => exportToExcel(filtered, DB.config)} className="flex items-center gap-2 text-sm font-medium text-green-900 bg-green-100 hover:bg-green-200 px-4 py-2.5 rounded-lg transition"><Download size={14}/>Excel</button>
        </div>
      </div>

      <div className="text-xs text-gray-500">{filtered.length} member{filtered.length !== 1 ? "s":""}</div>

      <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
        <div className="overflow-x-auto mobile-scroll">
          <table className="w-full text-sm mobile-small">
            <thead><tr className="bg-blue-900 text-white">
              {["M.S.NO","Name","PF","Zone","Centre","Mobile","Age","Blood","Status",""].map(h => (
                <th key={h} className={`text-left px-3 py-2.5 font-semibold text-xs uppercase tracking-wide ${(h==="Zone"||h==="Age"||h==="Blood")?"mobile-hide":""}`}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {paged.map((m,i) => {
                const iss = getIssues(m, zones);
                return (
                  <tr key={m.msno} className={`border-t hover:bg-blue-50 transition ${i%2 ? "bg-gray-50":"bg-white"}`}>
                    <td className="px-3 py-2.5 font-mono font-bold text-blue-900">{m.msno}</td>
                    <td className="px-3 py-2.5"><button onClick={() => nav("member-detail", m.msno)} className="text-blue-700 hover:underline font-medium">{m.name}</button>
                      {iss.length > 0 && <AlertTriangle size={12} className="inline ml-1 text-amber-500"/>}
                    </td>
                    <td className="px-3 py-2.5 font-mono text-gray-600">{m.pf}</td>
                    <td className="px-3 py-2.5 text-gray-600 mobile-hide">{m.zone}</td>
                    <td className="px-3 py-2.5 text-gray-600">{m.centre}</td>
                    <td className="px-3 py-2.5 text-gray-600">{m.mobile && <a href={`https://wa.me/91${String(m.mobile).replace(/\D/g,'').slice(-10)}`} target="_blank" rel="noopener" className="inline-flex items-center gap-1 hover:text-green-600 transition" title="WhatsApp">{m.mobile}<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" className="text-green-500 ml-1"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 0 0 .611.611l4.458-1.495A11.952 11.952 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.387 0-4.592-.836-6.318-2.228l-.143-.113-3.013 1.01 1.01-3.013-.113-.143A9.952 9.952 0 0 1 2 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg></a>}</td>
                    <td className="px-3 py-2.5 text-gray-600 mobile-hide">{getAge(m.dob) ?? "\u2014"}</td>
                    <td className="px-3 py-2.5 font-bold text-red-700 mobile-hide">{m.bloodGroup || "\u2014"}</td>
                    <td className="px-3 py-2.5">
                      <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${m.status==="ACTIVE"?"bg-green-100 text-green-800":m.status==="REMOVED"?"bg-red-100 text-red-800":"bg-gray-100 text-gray-600"}`}>{m.status}</span>
                    </td>
                    <td className="px-3 py-2.5"><button onClick={() => nav("member-detail", m.msno)} className="text-gray-400 hover:text-blue-600"><Eye size={16}/></button></td>
                  </tr>
                );
              })}
              {filtered.length === 0 && <tr><td colSpan={10} className="px-4 py-12 text-center text-gray-400">No members found.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      {totalPages > 1 && (
        <div className="flex items-center justify-between px-2">
          <span className="text-xs text-gray-500">Page {page} of {totalPages}</span>
          <div className="flex gap-1">
            <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page===1} className="px-3 py-1.5 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">Previous</button>
            {Array.from({length: Math.min(totalPages, 7)}, (_, i) => {
              let p;
              if (totalPages <= 7) p = i + 1;
              else if (page <= 4) p = i + 1;
              else if (page >= totalPages - 3) p = totalPages - 6 + i;
              else p = page - 3 + i;
              return <button key={p} onClick={() => setPage(p)} className={`w-8 h-8 rounded-lg text-xs font-medium transition ${page === p ? "bg-blue-900 text-white" : "border bg-white hover:bg-gray-50"}`}>{p}</button>;
            })}
            <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page===totalPages} className="px-3 py-1.5 rounded-lg text-xs font-medium border bg-white hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">Next</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   MEMBER DETAIL + INLINE EDITING (MASTER tab)
   ═══════════════════════════════════════════════════════════════════════════ */
function MemberDetail({ msno, zones, refresh, nav }) {
  const member = DB.members.find(m => m.msno === msno);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({});

  useEffect(() => { if (member) setForm({...member}); }, [msno]);

  if (!member) return <div className="text-center text-gray-400 py-12">Member not found.</div>;

  const issues = getIssues(member, zones);
  const age = getAge(member.dob);
  const groups = {};
  INPUT_FIELDS.forEach(f => { if (!groups[f.group]) groups[f.group] = []; groups[f.group].push(f); });

  const save = () => {
    const idx = DB.members.findIndex(m => m.msno === msno);
    if (idx >= 0) { DB.members[idx] = { ...form }; refresh(); setEditing(false); }
  };

  const cancel = () => { setForm({...member}); setEditing(false); };

  return (
    <div className="max-w-4xl mx-auto space-y-4">
      <button onClick={() => nav("members")} className="text-sm text-blue-700 hover:underline flex items-center gap-1 no-print"><ChevronLeft size={14}/>Back to Members</button>

      <div className="bg-white rounded-2xl shadow-lg border overflow-hidden">
        <div className="bg-blue-900 px-6 py-5 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <div className="w-14 h-14 rounded-full bg-blue-700 flex items-center justify-center text-white text-xl font-bold">{member.name?.charAt(0)}</div>
            <div>
              <h2 className="text-white text-xl font-bold">{member.title} {member.name}</h2>
              <div className="flex gap-4 mt-1 flex-wrap">
                <span className="text-blue-300 text-sm">M.S.NO <strong className="text-white">{member.msno}</strong></span>
                <span className="text-blue-300 text-sm">PF <strong className="text-white">{member.pf}</strong></span>
                {age && <span className="text-blue-300 text-sm">Age <strong className="text-white">{age}</strong></span>}
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${member.status==="ACTIVE"?"bg-green-500 text-white":"bg-red-500 text-white"}`}>{member.status}</span>
                {member.mobile && <a href={`https://wa.me/91${String(member.mobile).replace(/\D/g,'').slice(-10)}`} target="_blank" rel="noopener" className="text-green-400 hover:text-green-300 text-sm flex items-center gap-1"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 0 0 .611.611l4.458-1.495A11.952 11.952 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.387 0-4.592-.836-6.318-2.228l-.143-.113-3.013 1.01 1.01-3.013-.113-.143A9.952 9.952 0 0 1 2 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>WhatsApp</a>}
              </div>
            </div>
          </div>
          <button onClick={() => editing ? save() : setEditing(true)}
            className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition no-print ${editing ? "bg-green-500 text-white hover:bg-green-600" : "bg-white text-blue-900 hover:bg-blue-50"}`}>
            {editing ? <><Save size={16}/>Save Changes</> : <><Edit3 size={16}/>Edit</>}
          </button>
        </div>

        {issues.length > 0 && (
          <div className="bg-amber-50 border-b border-amber-200 px-6 py-3 flex items-center gap-2">
            <AlertTriangle size={16} className="text-amber-600"/>
            <span className="text-sm text-amber-800 font-medium">Issues: {issues.join(", ")}</span>
          </div>
        )}

        <div className="p-6 space-y-6">
          {editing && <div className="flex gap-2 justify-end no-print"><button onClick={cancel} className="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1"><X size={14}/>Cancel</button></div>}

          {Object.entries(groups).map(([group, fields]) => (
            <div key={group}>
              <h3 className="text-sm font-bold text-blue-900 uppercase tracking-wide border-b border-blue-200 pb-1 mb-3">{group}</h3>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-x-6 gap-y-3">
                {fields.map(f => (
                  <div key={f.key} className={f.type === "textarea" ? "col-span-2 md:col-span-3" : ""}>
                    <span className="text-xs text-gray-400 uppercase">{f.label}</span>
                    {editing && !f.readOnly ? (
                      <FieldInput field={f.key} value={form[f.key]} onChange={v => setForm(p => ({...p,[f.key]:v}))} zones={zones}/>
                    ) : (
                      <div className="text-sm font-medium text-gray-900">{f.key === "dob" && age ? `${member[f.key]} (age ${age})` : (member[f.key] || "\u2014")}</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   ISSUES VIEW
   ═══════════════════════════════════════════════════════════════════════════ */
function IssuesView({ issues, nav }) {
  const byType = {};
  issues.forEach(i => { byType[i.issue] = (byType[i.issue] || 0) + 1; });

  return (
    <div className="space-y-4">
      <div><h2 className="text-lg font-bold text-gray-900">Data Quality Issues</h2><p className="text-sm text-gray-500">Auto-detected from active members. Fix in the member detail view.</p></div>

      {issues.length === 0 ? (
        <div className="bg-white rounded-xl shadow-sm border p-12 text-center"><CheckCircle size={48} className="mx-auto mb-3 text-green-400"/><p className="text-gray-500 font-medium">All clear — no data issues found.</p></div>
      ) : (
        <>
          <div className="flex flex-wrap gap-2">
            {Object.entries(byType).map(([type, count]) => (
              <span key={type} className="bg-red-100 text-red-800 text-xs font-semibold px-3 py-1.5 rounded-full">{type}: {count}</span>
            ))}
          </div>

          <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
            <table className="w-full text-sm">
              <thead><tr className="bg-red-50">
                {["M.S.NO","Name","PF","Issue","Action"].map(h => <th key={h} className="text-left px-4 py-3 font-semibold text-xs uppercase text-red-900">{h}</th>)}
              </tr></thead>
              <tbody>
                {issues.map((iss, i) => (
                  <tr key={i} className="border-t hover:bg-red-50 transition">
                    <td className="px-4 py-2.5 font-mono font-bold text-blue-900">{iss.msno}</td>
                    <td className="px-4 py-2.5 font-medium">{iss.name}</td>
                    <td className="px-4 py-2.5 font-mono text-gray-600">{iss.pf}</td>
                    <td className="px-4 py-2.5"><span className="bg-red-100 text-red-800 text-xs font-semibold px-2 py-0.5 rounded-full">{iss.issue}</span></td>
                    <td className="px-4 py-2.5"><button onClick={() => nav("member-detail", iss.msno)} className="text-blue-600 hover:underline text-xs font-medium">Fix →</button></td>
